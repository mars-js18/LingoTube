<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', (e) => {});
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW error:', err));
        }
    </script>

    <script type="text/babel">
        // --- ICONOS ---
        const Icon = ({ name, size = 24, className = "", color="currentColor" }) => {
            const ref = React.useRef();
            React.useEffect(() => {
                if (ref.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size, stroke: color }
                    });
                }
            }, [name, size, className, color]);
            return <i ref={ref} data-lucide={name}></i>;
        };

        // --- DATOS DEL CURSO ---
        const PLAYLISTS = {
            beginner: 'PLAz9gX__ElWpQ0wYCzec4AenQ91t3n7jT',
            intermediate: 'PLAz9gX__ElWorwvQHOLm-bvFigMyDvuX2',
            advanced: 'PLAz9gX__ElWrCO8O3zRRMOwj2Bk5QtXTx'
        };
        const TOTAL_CLASSES = 195;
        const CLASS_DURATION = 60;
        const REVIEW_DURATION = 18;

        const MOTIVATIONAL_QUOTES = [
            "La práctica distribuida (Spaced Repetition) mejora la retención a largo plazo en un 200% comparado con el estudio masivo. (Ebbinghaus)",
            "El aprendizaje intercalado obliga al cerebro a discriminar patrones, aumentando la fluidez real en un 43%. (Rohrer, 2012)",
            "Dormir después de aprender consolida las memorias y fortalece las conexiones sinápticas del nuevo vocabulario. (Stickgold, 2005)",
            "Cometer errores durante la práctica activa señala al cerebro qué circuitos neuronales debe reforzar. ¡Equivócate sin miedo! (Metcalfe, 2017)",
            "El 'Efecto de Generación' demuestra que recordar activamente una palabra fortalece la memoria mucho más que solo leerla pasivamente. (Slamecka & Graf, 1978)",
            "Tu cerebro consume el 20% de tu energía. Sentir cansancio cognitivo tras una sesión de evocación significa que estás creando nuevas redes neuronales.",
            "La fluidez no es saber muchas palabras, sino automatizar el acceso a las que ya sabes mediante la mielinización de las vías neuronales."
        ];

        // --- DATOS DEL PLAN DE ESTUDIO NEUROCOGNITIVO ---
        const STUDY_PLAN = {
            1: { type: 'monday', name: 'Lunes de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            2: { type: 'tuesday', name: 'Martes de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            3: { type: 'wednesday', name: 'Miércoles de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            4: { type: 'thursday', name: 'Jueves de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            5: { type: 'friday', name: 'Viernes de Interferencia', color: 'bg-planFriday', textColor: 'text-planFriday', icon: 'Shuffle' },
            6: { type: 'saturday', name: 'Sábado de Consolidación', color: 'bg-planSaturday', textColor: 'text-planSaturday', icon: 'Layers' },
            0: { type: 'sunday', name: 'Domingo de Descompresión', color: 'bg-planSunday', textColor: 'text-planSunday', icon: 'Coffee' }
        };

        const getPlanDetails = (type, level) => {
            const isBeginner = level === 'beginner';
            
            const globalPhases = [
                { name: 'Bloque 1 (0-15m): Repaso Activo', desc: 'ESTRICTAMENTE PROHIBIDO ver pasivamente. Pausa el video al ver el estímulo, intenta explicar o conjugar en voz alta hacia la pantalla, y reanuda para comprobar tu precisión.' },
                { name: 'Bloque 1 (15-60m): Consumo y Anclaje', desc: 'Atención total a la prosodia, velocidad y entonación del profesor nativo. Prohibido transcribir explicaciones; usa Método Cornell para escribir "preguntas de recuperación" en el margen.' }
            ];

            const plans = {
                'monday': {
                    title: 'Lunes: Modelado Fonológico',
                    description: 'Día de Adquisición y Proceduralización Lineal. (Recuerda hacer tu Bloque Extra separado del horario de tu clase principal).',
                    phases: [
                        ...globalPhases,
                        { name: 'Bloque 2 Extra (30-45m): Shadowing', desc: 'Escucha el audio y repite en voz alta con una fracción de segundo de retraso. Imita minuciosamente cadencia y emoción. Realiza esta técnica preferiblemente de pie o caminando al aire libre.' }
                    ]
                },
                'tuesday': {
                    title: 'Martes: Automatización bajo presión',
                    description: 'Día de Adquisición y Proceduralización Lineal. Transfiere el control de tu idioma a la memoria procedimental.',
                    phases: [
                        ...globalPhases,
                        { name: 'Bloque 2 Extra (30-45m): Técnica 4/3/2', desc: 'Graba un discurso sobre un tema complejo de hoy por 4 minutos ininterrumpidos. Resetea y repite los mismos argumentos en 3 minutos. Fuérzate a una entrega final en solo 2 minutos para eliminar pausas.' }
                    ]
                },
                'wednesday': {
                    title: 'Miércoles: Activación Léxica y Vaciado',
                    description: 'Día de Adquisición y Proceduralización Lineal. Forzamos el conocimiento pasivo hacia la fase activa.',
                    phases: [
                        ...globalPhases,
                        { name: 'Bloque 2 Extra (30-45m): Vaciado o Protégé', desc: 'OPCIÓN A (Blurting): Oculta apuntes y escribe/dicta rápido por 5-10m todo lo que recuerdes, luego marca errores con rojo. OPCIÓN B (Protégé): Da una clase magistral oral de 5m en inglés a un alumno imaginario, de pie y gesticulando.' }
                    ]
                },
                'thursday': {
                    title: 'Jueves: Interacción Social y Lenguaje',
                    description: 'Día de Adquisición y Proceduralización Lineal. El objetivo hoy es perder el miedo al estrés conversacional.',
                    phases: [
                        ...globalPhases,
                        { name: 'Bloque 2 Extra (30-45m): Lenguaje Emergente', desc: 'Habla 30 mins con una persona real (HelloTalk, Discord, tutor). Meta: tolerar ambigüedad. Usa estrategias de compensación (circunloquio) para explicar palabras olvidadas y prioriza el flujo.' }
                    ]
                },
                'friday': {
                    title: 'Viernes: Consolidación vs. Avance',
                    description: isBeginner 
                        ? 'Día de Avance. Consolidación de rutinas y repaso de estructuras.'
                        : 'Rompe la dependencia lineal y obliga al cerebro a discriminar qué regla gramatical usar en tiempo real.',
                    phases: isBeginner ? [
                        ...globalPhases,
                        { name: 'Bloque 2 Extra (30-45m)', desc: 'Habla libremente con una IA conversacional, haz Shadowing o repite cualquiera de los ejercicios de lunes a jueves que prefieras.' }
                    ] : [
                        { name: 'Fase 1: Mosaico de Recuperación Visual', desc: 'PROHIBIDO tomar clase nueva. Carga los videos de Lun-Jue y ve SÓLO los primeros 15 mins de repaso a velocidad 1.5x, pausando para responder. Salta impredeciblemente.' },
                        { name: 'Fase 2: Producción Oral Intercalada', desc: 'Selecciona preguntas al azar de la semana y graba respuestas largas. Mezcla intencionalmente tiempos verbales y usa conectores discursivos avanzados (ej. "However", "At the same time").' }
                    ]
                },
                'saturday': {
                    title: 'Sábado: Consolidación y Transferencia',
                    description: 'El conocimiento debe independizarse del formato de video de clase. CERO videos académicos hoy.',
                    phases: isBeginner ? [
                        { name: 'Fase 1: Interferencia Contextual', desc: 'PROHIBIDO tomar clase nueva. Salta a repasos aleatorios de las clases previas.' },
                        { name: 'Fase 2: Repetición Espaciada', desc: 'Dedica 20-30 mins a tarjetas de producción inversa en Anki o RemNote (no reveles la respuesta hasta articular la oración perfecta en voz alta).' },
                        { name: 'Fase 3: Interacción No Guionizada', desc: 'Transferencia pura: diálogo en tiempo real con un tutor de intercambio o IA conversacional.' }
                    ] : [
                        { name: 'Fase 1: Repetición Espaciada', desc: 'PROHIBIDO tomar clase nueva. Dedica 20-30 mins a tarjetas de producción inversa en Anki o RemNote justo antes de la curva del olvido.' },
                        { name: 'Fase 2: Interacción No Guionizada', desc: 'Búsqueda de transferencia pura: diálogo en tiempo real con tutor, IA, o un monólogo ininterrumpido. (Opcional: Repaso guiado de la guía del alumno).' }
                    ]
                },
                'sunday': {
                    title: 'Domingo: Metacognición vs. Descanso',
                    description: isBeginner 
                        ? 'Día de afianzamiento ligero y preparación para la nueva semana.'
                        : 'Recuperación neuroquímica y sináptica del cerebro. Erradicación absoluta del estudio consciente y evocación activa.',
                    phases: isBeginner ? [
                        { name: 'Repaso Ligero Espaciado', desc: 'Pasa 20-30 minutos en Anki haciendo tarjetas de producción inversa.' },
                        { name: 'Interacción y Cierre', desc: 'Interacción oral no guionizada con tutor o IA. Puedes leer de forma ligera el libro de repaso para afianzar.' }
                    ] : [
                        { name: 'Descompresión y Exposición Pasiva', desc: 'Exponte al idioma SÓLO por entretenimiento pasivo y placer (documental, novela gráfica, podcast). Asienta el lexicón inconsciente y reduce tu filtro afectivo.' },
                        { name: 'Opcional', desc: 'Lectura ligera de la guía de repaso del alumno (sin presión).' }
                    ]
                }
            };

            return plans[type];
        };

        // --- ESTADO GLOBAL (Custom Hook) ---
        function useAppStore() {
            const [data, setData] = React.useState(() => {
                const saved = localStorage.getItem('lingoTubeData');
                let parsed = saved ? JSON.parse(saved) : null;
                if (!parsed) {
                    parsed = {
                        streak: 0,
                        lastActiveDate: null,
                        completed: { beginner: [], intermediate: [], advanced: [] },
                        reviews: { beginner: [], intermediate: [], advanced: [] },
                        notes: {},
                        routineProgress: {},
                        streakFreezes: 3,
                        lastFreezeRefillMonth: new Date().toISOString().slice(0, 7) // Ej. "2023-10"
                    };
                } else {
                    // Migraciones para usuarios existentes
                    if (!parsed.routineProgress) parsed.routineProgress = {};
                    if (parsed.streakFreezes === undefined) {
                        parsed.streakFreezes = 3;
                        parsed.lastFreezeRefillMonth = new Date().toISOString().slice(0, 7);
                    }
                }
                return parsed;
            });

            React.useEffect(() => {
                localStorage.setItem('lingoTubeData', JSON.stringify(data));
            }, [data]);

            const [courseData, setCourseData] = React.useState(() => {
                const saved = localStorage.getItem('lingoTubeCourseData');
                const defaultData = { 
                    beginner: [], intermediate: [], advanced: [],
                    beginnerReview: [], intermediateReview: [], advancedReview: []
                };
                return saved ? { ...defaultData, ...JSON.parse(saved) } : defaultData;
            });

            React.useEffect(() => {
                localStorage.setItem('lingoTubeCourseData', JSON.stringify(courseData));
            }, [courseData]);

            const updateCourseData = (levelKey, levelData) => {
                setCourseData(prev => ({ ...prev, [levelKey]: levelData }));
            };

            const [streakIncreased, setStreakIncreased] = React.useState(false);

            // --- LÓGICA INTELIGENTE DE COMODINES DE RACHA ---
            React.useEffect(() => {
                setData(prev => {
                    const today = new Date();
                    const todayStr = today.toDateString();
                    const currentMonthStr = today.getFullYear() + "-" + (today.getMonth() + 1).toString().padStart(2, '0');
                    
                    let newState = { ...prev };
                    let stateChanged = false;

                    if (newState.lastFreezeRefillMonth !== currentMonthStr) {
                        newState.streakFreezes = 3;
                        newState.lastFreezeRefillMonth = currentMonthStr;
                        stateChanged = true;
                    }

                    if (newState.lastActiveDate && newState.lastActiveDate !== todayStr) {
                        const lastDate = new Date(newState.lastActiveDate);
                        const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                        const lastDateMidnight = new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate());
                        
                        const diffTime = todayMidnight.getTime() - lastDateMidnight.getTime();
                        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                        if (diffDays > 1) {
                            const missedDays = diffDays - 1;
                            if (newState.streakFreezes >= missedDays) {
                                newState.streakFreezes -= missedDays;
                                const yesterday = new Date(todayMidnight);
                                yesterday.setDate(yesterday.getDate() - 1);
                                newState.lastActiveDate = yesterday.toDateString();
                                stateChanged = true;
                            } else {
                                if (newState.streak !== 0) {
                                    newState.streak = 0;
                                    stateChanged = true;
                                }
                            }
                        }
                    }
                    return stateChanged ? newState : prev;
                });
            }, []);

            const updateActivity = () => {
                const today = new Date().toDateString();
                setData(prev => {
                    if (prev.lastActiveDate === today) return prev; // Ya actuó hoy, no incrementa más
                    
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const keptStreak = prev.lastActiveDate === yesterday.toDateString();
                    
                    if (keptStreak || prev.streak === 0) {
                        setStreakIncreased(true);
                        setTimeout(() => setStreakIncreased(false), 2000);
                        confetti({ particleCount: 50, spread: 60, origin: { y: 0.1 }, colors: ['#ffc800', '#ff4b4b'], zIndex: 100 });
                    }

                    return {
                        ...prev,
                        streak: keptStreak ? prev.streak + 1 : 1,
                        lastActiveDate: today
                    };
                });
            };

            const toggleProgress = (level, classId, type) => {
                updateActivity();
                
                setData(prev => {
                    const isDone = prev[type][level].includes(classId);
                    const newState = { ...prev };
                    
                    if (isDone) {
                        newState[type] = {
                            ...prev[type],
                            [level]: prev[type][level].filter(id => id < classId)
                        };
                        if (type === 'completed') {
                            newState.reviews = {
                                ...prev.reviews,
                                [level]: prev.reviews[level].filter(id => id < classId)
                            };
                        }
                    } else {
                        const newIds = Array.from({ length: classId }, (_, i) => i + 1);
                        newState[type] = {
                            ...prev[type],
                            [level]: Array.from(new Set([...prev[type][level], ...newIds]))
                        };
                        if (type === 'reviews') {
                            newState.completed = {
                                ...prev.completed,
                                [level]: Array.from(new Set([...prev.completed[level], ...newIds]))
                            };
                        }
                    }
                    return newState;
                });
            };

            const toggleRoutinePhase = (dateStr, phaseIdx, totalPhases) => {
                updateActivity();
                setData(prev => {
                    const todayProgress = prev.routineProgress?.[dateStr] || [];
                    const isDone = todayProgress.includes(phaseIdx);
                    const newProgress = isDone
                        ? todayProgress.filter(i => i !== phaseIdx)
                        : [...todayProgress, phaseIdx];

                    if (!isDone && newProgress.length === totalPhases) {
                        setTimeout(() => {
                            confetti({ particleCount: 150, spread: 80, origin: { y: 0.4 }, zIndex: 9999 });
                        }, 100);
                    }

                    return {
                        ...prev,
                        routineProgress: {
                            ...(prev.routineProgress || {}),
                            [dateStr]: newProgress
                        }
                    };
                });
            };

            const saveNote = (classKey, text) => {
                updateActivity();
                setData(prev => ({
                    ...prev,
                    notes: { ...prev.notes, [classKey]: text }
                }));
            };

            return { data, toggleProgress, toggleRoutinePhase, saveNote, courseData, updateCourseData, streakIncreased };
        }

        const getOffset = (index) => {
            const cycle = index % 8;
            if (cycle === 0 || cycle === 4) return 0;
            if (cycle === 1 || cycle === 3) return 30;
            if (cycle === 2) return 50;
            if (cycle === 5 || cycle === 7) return -30;
            if (cycle === 6) return -50;
            return 0;
        };

        const App = () => {
            const { data, toggleProgress, toggleRoutinePhase, saveNote, courseData, updateCourseData, streakIncreased } = useAppStore();
            const [currentTab, setCurrentTab] = React.useState('learn');
            const [currentLevel, setCurrentLevel] = React.useState('beginner');
            const [selectedClass, setSelectedClass] = React.useState(null);
            const [isRoutineOpen, setIsRoutineOpen] = React.useState(false);
            const [isStreakModalOpen, setIsStreakModalOpen] = React.useState(false);
            const [dailyQuote, setDailyQuote] = React.useState('');
            const [streakQuote, setStreakQuote] = React.useState('');
            const [showScrollTop, setShowScrollTop] = React.useState(false);
            
            const activeNodeRef = React.useRef(null);

            React.useEffect(() => {
                setDailyQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
                setStreakQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
            }, []);

            // Efecto para abrir el Modal automáticamente cuando sube la racha
            React.useEffect(() => {
                if (streakIncreased) {
                    setIsStreakModalOpen(true);
                }
            }, [streakIncreased]);

            // Efecto de Auto-Scroll a la lección activa
            React.useEffect(() => {
                if (currentTab === 'learn' && activeNodeRef.current) {
                    setTimeout(() => {
                        activeNodeRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }
            }, [currentTab, currentLevel]);

            // Lógica para detectar si se hizo scroll (mostrar botón subir)
            React.useEffect(() => {
                const handleScroll = () => {
                    if (window.scrollY > 300) {
                        setShowScrollTop(true);
                    } else {
                        setShowScrollTop(false);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const currentDay = new Date().getDay();
            const currentPlan = STUDY_PLAN[currentDay];
            const planDetails = getPlanDetails(currentPlan.type, currentLevel);

            const renderHeader = () => {
                const totalClassesDone = data.completed.beginner.length + data.completed.intermediate.length + data.completed.advanced.length;
                
                return (
                    <header className="fixed top-0 w-full bg-darker/90 backdrop-blur-md z-40 border-b border-surface px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-wider text-white">
                            <Icon name="PlayCircle" color="#58cc02" />
                            LingoTube
                        </div>
                        <div className="flex gap-4 font-bold text-lg">
                            <button 
                                onClick={() => setIsStreakModalOpen(true)}
                                className="flex items-center gap-1 text-orange-400 hover:text-orange-300 transition-all relative"
                            >

                                    trophyBg = 'bg-duogold'; trophyBorder = 'border-duogoldDark'; trophyIconColor = '#ffffff';
                                    trophyAnimate = 'shadow-[0_0_40px_rgba(255,200,0,0.8)] animate-bounce-slow';

                        </div>

                        <div className="mt-8 bg-surface border-2 border-duogray p-5 rounded-2xl flex items-start gap-4 shadow-lg">

            const renderStatsTab = () => {

                const minsDone = (totalClassesDone * CLASS_DURATION) + (totalReviewsDone * REVIEW_DURATION);

                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const parseCSVText = (text) => {
                const lines = text.split('\n');
                const parsedData = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const row = [];
                    let inQuotes = false;
                    let current = '';
                    for (let j = 0; j < lines[i].length; j++) {
                        const char = lines[i][j];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { row.push(current.trim()); current = ''; }
                        else current += char;
                    }
                    row.push(current.trim());
                    if (row.length >= 4) {
                        parsedData.push({ 
                            id: parseInt(row[0]), 
                            title: row[1].replace(/^"|"$/g, ''), 
                            videoUrl: row[2], 
                            videoId: row[3],
                            // Lógica de Descripción (Índice 6 en el CSV)
                            description: row[6] ? row.slice(6).join(',').replace(/^"|"$/g, '') : null 
                        });
                    }
                }
                return parsedData;
            };

            const CSV_LEVELS = [
                'beginner', 'intermediate', 'advanced', 
                'beginnerReview', 'intermediateReview', 'advancedReview'

                const autoLoad = async () => {
                    for (const lvl of CSV_LEVELS) {
                        if (!courseData[lvl] || courseData[lvl].length === 0) {
                            try {
                                const response = await fetch(`./${lvl}.csv`);
                                if (response.ok) {
                                    const text = await response.text();
                                    updateCourseData(lvl, parseCSVText(text));
                                }

                                console.log(`No se pudo auto-cargar ${lvl}.csv`);
                            }
                        }
                    }
                };
                autoLoad();

                let loadedAny = false;
                for (const lvl of CSV_LEVELS) {
                    try {
                        const response = await fetch(`./${lvl}.csv`);
                        if (response.ok) {
                            const text = await response.text();
                            const parsed = parseCSVText(text);
                            if(parsed.length > 0) {
                                updateCourseData(lvl, parsed);
                                loadedAny = true;
                            }
                        }
                    } catch (err) {}
                }
                if(loadedAny) alert("¡Datos sincronizados con éxito desde GitHub!");
                else alert("No se encontraron algunos archivos .csv.");

                    updateCourseData(levelKey, parseCSVText(e.target.result));

                        </p>
                        
                        {['beginner', 'intermediate', 'advanced'].map(lvl => {
                            const nameMap = { beginner: 'Principiante', intermediate: 'Intermedio', advanced: 'Avanzado' };

                            const reviewKey = `${lvl}Review`;
                            
                            const classesLoaded = courseData[classKey] && courseData[classKey].length > 0;
                            const reviewsLoaded = courseData[reviewKey] && courseData[reviewKey].length > 0;

                            return (
                                <div key={lvl} className="mb-6 bg-darker p-4 rounded-xl border border-surface">
                                    <h3 className="font-bold text-md mb-3 text-white border-b border-surface pb-2">{nameMap[lvl]}</h3>
                                    
                                    <div className="mb-4">
                                        <label className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-sm text-duotext">Clases Originales</span>
                                            {classesLoaded ? (
                                                <span className="text-xs font-bold text-duogreen flex items-center gap-1"><Icon name="Check" size={14}/> {courseData[classKey].length} cargadas</span>
                                            ) : (
                                                <span className="text-xs font-bold text-orange-400">Falta subir</span>
                                            )}
                                        </label>
                                        <input type="file" accept=".csv" onChange={(e) => { if(e.target.files[0]) handleFileUpload(classKey, e.target.files[0]); }}

                                    </div>

                                    <div>
                                        <label className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-sm text-duotext">Repasos de 18m</span>
                                            {reviewsLoaded ? (
                                                <span className="text-xs font-bold text-duogold flex items-center gap-1"><Icon name="Check" size={14}/> {courseData[reviewKey].length} cargados</span>
                                            ) : (
                                                <span className="text-xs font-bold text-orange-400">Falta subir</span>
                                            )}
                                        </label>
                                        <input type="file" accept=".csv" onChange={(e) => { if(e.target.files[0]) handleFileUpload(reviewKey, e.target.files[0]); }}
                                            className="block w-full text-xs text-duotext file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-duogold/20 file:text-duogold hover:file:bg-duogold/30 cursor-pointer" />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderTabBar = () => (
                <nav className="fixed bottom-0 w-full bg-darker border-t border-surface py-3 px-6 z-40 pb-safe">
                    <div className="flex justify-between max-w-md mx-auto relative">
                        <button onClick={() => setCurrentTab('learn')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'learn' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}>
                            <Icon name="Home" />
                            <span className="text-xs font-bold mt-1">Aprender</span>
                        </button>
                        <button onClick={() => setCurrentTab('stats')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'stats' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}>
                            <Icon name="BarChart2" />
                            <span className="text-xs font-bold mt-1">Estadísticas</span>
                        </button>
                        <button onClick={() => setCurrentTab('profile')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'profile' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}>
                            <Icon name="User" />
                            <span className="text-xs font-bold mt-1">Perfil</span>
                        </button>
                    </div>
                </nav>
            );

            const handleProgressWithConfetti = (level, classId, type) => {
                const isAlreadyDone = data[type][level].includes(classId);
                
                if (!isAlreadyDone) {
                    if (type === 'completed') {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#58cc02', '#ffffff'] });
                    } else if (type === 'reviews') {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ffc800', '#ffffff'] });
                    }
                }
                
                toggleProgress(level, classId, type);
            };

            const renderModal = () => {
                if (!selectedClass) return null;

                const classKey = `${currentLevel}-${selectedClass}`;
                const isClassCompleted = data.completed[currentLevel].includes(selectedClass);
                const isReviewCompleted = data.reviews[currentLevel].includes(selectedClass);
                const note = data.notes[classKey] || '';

                const levelCourses = courseData[currentLevel] || [];
                const courseInfo = levelCourses.find(c => c.id === selectedClass);
                const ytClassLink = courseInfo && courseInfo.videoUrl ? courseInfo.videoUrl : `https://www.youtube.com/watch?list=${PLAYLISTS[currentLevel]}&index=${selectedClass}`;
                const displayTitle = courseInfo && courseInfo.title ? courseInfo.title : `Clase ${selectedClass}`;

                const reviewCourses = courseData[`${currentLevel}Review`] || [];
                const reviewInfo = reviewCourses.find(c => c.id === selectedClass);
                const ytReviewLink = reviewInfo && reviewInfo.videoUrl ? reviewInfo.videoUrl : null; 

                return (
                    <div className="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center p-4">
                        <div className="bg-dark w-full max-w-sm rounded-3xl p-6 flex flex-col gap-4 transform transition-all border-2 border-surface animate-[slideUp_0.3s_ease-out] max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-start border-b border-surface pb-4 mb-2">
                                <div className="pr-4">
                                    <div className="text-duotext text-sm font-bold uppercase tracking-wider mb-1">
                                        {currentLevel === 'beginner' ? 'Principiante' : currentLevel === 'intermediate' ? 'Intermedio' : 'Avanzado'} • #{selectedClass}
                                    </div>
                                    <h3 className="text-xl font-bold leading-tight">{displayTitle}</h3>
                                </div>
                                <button onClick={() => setSelectedClass(null)} className="bg-surface p-2 rounded-full text-duotext hover:text-white shrink-0">
                                    <Icon name="X" />
                                </button>
                            </div>

                            {/* Mostrar Descripción del CSV si existe */}
                            {courseInfo && courseInfo.description && (
                                <div className="bg-darker p-3 rounded-xl border border-duogray mb-1">
                                    <h4 className="text-xs font-bold text-duotext mb-1 uppercase tracking-wider">Notas de la Clase</h4>
                                    <p className="text-sm text-white/90 whitespace-pre-wrap">{courseInfo.description}</p>
                                </div>
                            )}

                            <div className="flex gap-2 mb-2 mt-1">
                                <a 
                                    href={ytClassLink} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="duo-btn flex-1 bg-[#ff0000] hover:bg-[#cc0000] text-white font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 border-[#b30000] text-sm"
                                >
                                    <Icon name="Youtube" size={20} />
                                    <span>Ver Clase (60m)</span>
                                </a>

                                {ytReviewLink && (
                                    <a 
                                        href={ytReviewLink} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="duo-btn flex-1 bg-duogold hover:bg-duogoldDark text-white font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 border-[#cca000] text-sm"
                                    >
                                        <Icon name="PlayCircle" size={20} />
                                        <span>Ver Repaso (18m)</span>
                                    </a>
                                )}
                            </div>

                            <div className="grid grid-cols-1 gap-3">
                                <button 
                                    onClick={() => handleProgressWithConfetti(currentLevel, selectedClass, 'completed')}
                                    className={`duo-btn w-full font-bold py-3 px-2 rounded-2xl flex items-center justify-center gap-2 text-[15px] border-b-4 ${
                                        isClassCompleted 
                                        ? 'bg-surface text-white border-duogray' 
                                        : 'bg-duogreen text-white border-duogreenDark'
                                    }`}
                                >
                                    {isClassCompleted ? <Icon name="Undo2" size={20}/> : <Icon name="Check" size={20}/>}
                                    {isClassCompleted ? 'Desmarcar Clase' : 'Completar Clase (y previas)'}
                                </button>

                                <button 
                                    onClick={() => handleProgressWithConfetti(currentLevel, selectedClass, 'reviews')}
                                    className={`duo-btn w-full font-bold py-3 px-2 rounded-2xl flex items-center justify-center gap-2 text-[15px] border-b-4 ${
                                        isReviewCompleted 
                                        ? 'bg-surface text-white border-duogray' 
                                        : 'bg-duogold text-white border-duogoldDark'
                                    }`}
                                >
                                    {isReviewCompleted ? <Icon name="Undo2" size={20}/> : <Icon name="RotateCw" size={20}/>}
                                    {isReviewCompleted ? 'Desmarcar Repaso' : 'Completar Repaso (y previos)'}
                                </button>
                            </div>

                            <div className="mt-2">
                                <label className="flex items-center gap-2 text-sm font-bold text-duotext mb-2">
                                    <Icon name="BookOpen" size={16} />
                                    Mis Notas para esta clase:
                                </label>
                                <textarea 
                                    className="w-full bg-surface border-2 border-duogray rounded-xl p-3 text-white focus:outline-none focus:border-duoblue resize-none h-24"
                                    placeholder="Escribe aquí el tema, vocabulario o apuntes..."
                                    value={note}
                                    onChange={(e) => saveNote(classKey, e.target.value)}
                                ></textarea>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative font-sans overflow-x-hidden">
                    {renderHeader()}
                    {renderStreakModal()}
                    <main>
                        {currentTab === 'learn' && renderLearnTab()}
                        {currentTab === 'stats' && renderStatsTab()}
                        {currentTab === 'profile' && renderProfileTab()}
                    </main>
                    
                    {/* Botón Flotante para subir */}
                    {showScrollTop && (
                        <button
                            onClick={scrollToTop}
                            className="fixed bottom-20 right-4 w-12 h-12 bg-duoblue hover:bg-duoblueDark text-white rounded-full shadow-lg flex items-center justify-center z-30 transition-all animate-[scaleIn_0.2s_ease-out]"
                            aria-label="Subir"
                        >
                            <Icon name="ArrowUp" size={24} />
                        </button>
                    )}

                    {renderTabBar()}
                    {renderModal()}
                    
                    <style>{`
                        @keyframes slideUp {
                            from { transform: translateY(-10px); opacity: 0; }
                            to { transform: translateY(0); opacity: 1; }
                        }
                        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
