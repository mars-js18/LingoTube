    <style>
        body { background-color: #111b21; color: white; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111b21; }
        ::-webkit-scrollbar-thumb { background: #37464f; border-radius: 10px; }
        
        .duo-btn { transition: all 0.1s; border-bottom-width: 4px; }
        .duo-btn:active { transform: translateY(4px); border-bottom-width: 0px; margin-bottom: 4px; }
        
        .path-node { position: relative; z-index: 10; }
        .node-connector { position: absolute; width: 4px; z-index: 1; }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-30px) scale(1.5); opacity: 0; } }
        .animate-float-up { animation: floatUp 1.5s ease-out forwards; }

</head>
<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', (e) => {});
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW error:', err));
        }
    </script>

    <script type="text/babel">
        // --- ICONOS ---
        const Icon = ({ name, size = 24, className = "", color="currentColor" }) => {
            const ref = React.useRef();
            React.useEffect(() => {
                if (ref.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size, stroke: color }
                    });
                }
            }, [name, size, className, color]);
            return <i ref={ref} data-lucide={name}></i>;
        };

        // --- RENDERIZADOR DE SUBRAYADO (Highlighting) ---
        // Convierte el texto "==texto==" en texto con fondo amarillo
        const renderHighlightedText = (text) => {
            if (!text) return null;
            const parts = text.split(/(==.*?==)/g);
            return parts.map((part, i) => {
                if (part.startsWith('==') && part.endsWith('==')) {
                    return <mark key={i} className="bg-yellow-500/80 text-darker font-bold rounded px-1.5 py-0.5 shadow-sm">{part.slice(2, -2)}</mark>;
                }
                return <span key={i}>{part}</span>;
            });
        };

        // --- DATOS DEL CURSO ---
        const PLAYLISTS = {
            beginner: 'PLAz9gX__ElWpQ0wYCzec4AenQ91t3n7jT',
            intermediate: 'PLAz9gX__ElWorwvQHOLm-bvFigMyDvuX2',
            advanced: 'PLAz9gX__ElWrCO8O3zRRMOwj2Bk5QtXTx'
        };
        const TOTAL_CLASSES = 195;
        const CLASS_DURATION = 60;
        const REVIEW_DURATION = 18;

        const MOTIVATIONAL_QUOTES = [
            "La práctica distribuida mejora la retención a largo plazo en un 200%.",
            "El aprendizaje intercalado aumenta la fluidez real en un 43%.",
            "Dormir después de aprender consolida las conexiones sinápticas del vocabulario.",
            "Cometer errores señala a tu cerebro qué circuitos debe reforzar. ¡Equivócate!",
            "Recordar activamente fortalece la memoria mucho más que leer pasivamente.",
            "La fatiga cognitiva significa que estás creando nuevas redes neuronales.",
            "Fluidez es automatizar el acceso a palabras mediante mielinización."
        ];

        const STUDY_PLAN = {
            1: { type: 'monday', name: 'Lunes de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            2: { type: 'tuesday', name: 'Martes de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            3: { type: 'wednesday', name: 'Miércoles de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            4: { type: 'thursday', name: 'Jueves de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            5: { type: 'friday', name: 'Viernes de Interferencia', color: 'bg-planFriday', textColor: 'text-planFriday', icon: 'Shuffle' },
            6: { type: 'saturday', name: 'Sábado de Consolidación', color: 'bg-planSaturday', textColor: 'text-planSaturday', icon: 'Layers' },
            0: { type: 'sunday', name: 'Domingo de Descompresión', color: 'bg-planSunday', textColor: 'text-planSunday', icon: 'Coffee' }
        };

        const getPlanDetails = (type, level) => {
            const isBeginner = level === 'beginner';
            const globalPhases = [
                { name: 'Bloque 1 (0-15m): Repaso Activo', desc: 'Pausa el video al ver el estímulo, intenta explicar en voz alta y reanuda para comprobar.' },
                { name: 'Bloque 1 (15-60m): Consumo y Anclaje', desc: 'Atención a la prosodia. Usa Método Cornell para preguntas de recuperación.' }
            ];

            const plans = {
                'monday': {
                    title: 'Lunes: Modelado Fonológico', description: 'Adquisición Lineal. (Haz tu Bloque Extra separado de la clase principal).',
                    phases: [...globalPhases, { name: 'Bloque 2 (30-45m): Shadowing', desc: 'Repite en voz alta con fracción de segundo de retraso. Imita cadencia y emoción.' }]
                },
                'tuesday': {
                    title: 'Martes: Automatización bajo presión', description: 'Transfiere el control de tu idioma a la memoria procedimental.',
                    phases: [...globalPhases, { name: 'Bloque 2 (30-45m): Técnica 4/3/2', desc: 'Graba 4m sobre un tema. Repite en 3m. Finalmente en 2m.' }]
                },
                'wednesday': {
                    title: 'Miércoles: Activación Léxica', description: 'Forzamos el conocimiento pasivo hacia la fase activa.',
                    phases: [...globalPhases, { name: 'Bloque 2 (30-45m): Vaciado o Protégé', desc: 'Blurting: escribe sin parar 5-10m lo que recuerdes. O Protégé: da clase de 5m a alumno imaginario.' }]
                },
                'thursday': {
                    title: 'Jueves: Interacción Social', description: 'Pierde el miedo al estrés conversacional.',
                    phases: [...globalPhases, { name: 'Bloque 2 (30-45m): Lenguaje Emergente', desc: 'Habla 30m con persona real. Prioriza tolerar la ambigüedad y el flujo.' }]
                },
                'friday': {
                    title: 'Viernes: Interferencia Contextual', description: 'Obliga al cerebro a discriminar reglas en tiempo real.',
                    phases: isBeginner ? [...globalPhases, { name: 'Bloque 2 Extra', desc: 'Habla con IA o repite ejercicios previos.' }] : [
                        { name: 'Fase 1: Mosaico Visual', desc: 'PROHIBIDO clase nueva. Ve 15 mins de repasos Lun-Jue a 1.5x saltando aleatoriamente.' },
                        { name: 'Fase 2: Intercalada', desc: 'Mezcla tiempos verbales y usa conectores avanzados.' }
                    ]
                },
                'saturday': {
                    title: 'Sábado: Consolidación', description: 'Independiza el conocimiento. CERO videos hoy.',
                    phases: isBeginner ? [
                        { name: 'Interferencia', desc: 'Repasos aleatorios de clases previas.' },
                        { name: 'Repetición Espaciada', desc: '20-30 mins tarjetas de producción inversa.' }
                    ] : [
                        { name: 'Repetición Espaciada', desc: '20-30 mins de Anki/RemNote.' },
                        { name: 'Interacción', desc: 'Diálogo en tiempo real o monólogo continuo.' }
                    ]
                },
                'sunday': {
                    title: 'Domingo: Descompresión', description: 'Recuperación neuroquímica.',
                    phases: isBeginner ? [
                        { name: 'Repaso Ligero', desc: '20-30 mins de Anki.' },
                        { name: 'Lectura', desc: 'Lectura ligera del libro de repaso.' }
                    ] : [
                        { name: 'Exposición Pasiva', desc: 'Consumo por entretenimiento sin estudio consciente.' }
                    ]
                }
            };
            return plans[type];
        };

        // --- ESTADO GLOBAL (Custom Hook) ---
        function useAppStore() {
            const [data, setData] = React.useState(() => {
                const saved = localStorage.getItem('lingoTubeData');
                let parsed = saved ? JSON.parse(saved) : null;
                if (!parsed) {
                    parsed = {
                        streak: 0, lastActiveDate: null,
                        completed: { beginner: [], intermediate: [], advanced: [] },
                        reviews: { beginner: [], intermediate: [], advanced: [] },
                        bookmarks: { beginner: [], intermediate: [], advanced: [] },
                        notes: {}, chunks: {}, routineProgress: {},
                        streakFreezes: 3, lastFreezeRefillMonth: new Date().toISOString().slice(0, 7)
                    };
                } else {
                    if (!parsed.routineProgress) parsed.routineProgress = {};
                    if (!parsed.bookmarks) parsed.bookmarks = { beginner: [], intermediate: [], advanced: [] };
                    if (!parsed.chunks) parsed.chunks = {};
                    if (parsed.streakFreezes === undefined) {
                        parsed.streakFreezes = 3;
                        parsed.lastFreezeRefillMonth = new Date().toISOString().slice(0, 7);
                    }
                }
                return parsed;
            });

            React.useEffect(() => { localStorage.setItem('lingoTubeData', JSON.stringify(data)); }, [data]);

            const [courseData, setCourseData] = React.useState(() => {
                const saved = localStorage.getItem('lingoTubeCourseData');
                const defaultData = { beginner: [], intermediate: [], advanced: [], beginnerReview: [], intermediateReview: [], advancedReview: [] };
                return saved ? { ...defaultData, ...JSON.parse(saved) } : defaultData;
            });

            React.useEffect(() => { localStorage.setItem('lingoTubeCourseData', JSON.stringify(courseData)); }, [courseData]);

            const updateCourseData = (levelKey, levelData) => setCourseData(prev => ({ ...prev, [levelKey]: levelData }));

            const [streakIncreased, setStreakIncreased] = React.useState(false);

            React.useEffect(() => {
                setData(prev => {
                    const today = new Date();
                    const todayStr = today.toDateString();
                    const currentMonthStr = today.getFullYear() + "-" + (today.getMonth() + 1).toString().padStart(2, '0');
                    
                    let newState = { ...prev };
                    let stateChanged = false;

                    if (newState.lastFreezeRefillMonth !== currentMonthStr) {
                        newState.streakFreezes = 3;
                        newState.lastFreezeRefillMonth = currentMonthStr;
                        stateChanged = true;
                    }

                    if (newState.lastActiveDate && newState.lastActiveDate !== todayStr) {
                        const lastDate = new Date(newState.lastActiveDate);
                        const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                        const lastDateMidnight = new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate());
                        const diffDays = Math.floor((todayMidnight.getTime() - lastDateMidnight.getTime()) / (1000 * 60 * 60 * 24));

                        if (diffDays > 1) {
                            const missedDays = diffDays - 1;
                            if (newState.streakFreezes >= missedDays) {
                                newState.streakFreezes -= missedDays;
                                const yesterday = new Date(todayMidnight);
                                yesterday.setDate(yesterday.getDate() - 1);
                                newState.lastActiveDate = yesterday.toDateString();
                                stateChanged = true;
                            } else {
                                if (newState.streak !== 0) { newState.streak = 0; stateChanged = true; }
                            }
                        }
                    }
                    return stateChanged ? newState : prev;
                });
            }, []);

            const updateActivity = () => {
                const today = new Date().toDateString();
                setData(prev => {
                    if (prev.lastActiveDate === today) return prev; 
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const keptStreak = prev.lastActiveDate === yesterday.toDateString();
                    
                    if (keptStreak || prev.streak === 0) {
                        setStreakIncreased(true);
                        setTimeout(() => setStreakIncreased(false), 2000);
                        confetti({ particleCount: 50, spread: 60, origin: { y: 0.1 }, colors: ['#ffc800', '#ff4b4b'], zIndex: 100 });
                    }

                    return { ...prev, streak: keptStreak ? prev.streak + 1 : 1, lastActiveDate: today };
                });
            };

            const toggleProgress = (level, classId, type) => {
                updateActivity();
                setData(prev => {
                    const isDone = prev[type][level].includes(classId);
                    const newState = { ...prev };
                    
                    if (isDone) {
                        newState[type] = { ...prev[type], [level]: prev[type][level].filter(id => id < classId) };
                        if (type === 'completed') {
                            newState.reviews = { ...prev.reviews, [level]: prev.reviews[level].filter(id => id < classId) };
                        }
                    } else {
                        const newIds = Array.from({ length: classId }, (_, i) => i + 1);
                        newState[type] = { ...prev[type], [level]: Array.from(new Set([...prev[type][level], ...newIds])) };
                        if (type === 'reviews') {
                            newState.completed = { ...prev.completed, [level]: Array.from(new Set([...prev.completed[level], ...newIds])) };
                        }
                    }
                    return newState;
                });
            };

            const toggleBookmark = (level, classId) => {
                setData(prev => {
                    const isBookmarked = prev.bookmarks[level].includes(classId);
                    return {
                        ...prev,
                        bookmarks: {
                            ...prev.bookmarks,
                            [level]: isBookmarked ? prev.bookmarks[level].filter(id => id !== classId) : [...prev.bookmarks[level], classId]
                        }
                    };
                });
            };

            const toggleRoutinePhase = (dateStr, phaseIdx, totalPhases) => {
                updateActivity();
                setData(prev => {
                    const todayProgress = prev.routineProgress?.[dateStr] || [];
                    const isDone = todayProgress.includes(phaseIdx);
                    const newProgress = isDone ? todayProgress.filter(i => i !== phaseIdx) : [...todayProgress, phaseIdx];

                    if (!isDone && newProgress.length === totalPhases) {
                        setTimeout(() => { confetti({ particleCount: 150, spread: 80, origin: { y: 0.4 }, zIndex: 9999 }); }, 100);
                    }
                    return { ...prev, routineProgress: { ...(prev.routineProgress || {}), [dateStr]: newProgress } };
                });
            };

            const saveNote = (classKey, text) => {
                updateActivity();
                setData(prev => ({ ...prev, notes: { ...prev.notes, [classKey]: text } }));
            };

            const saveChunk = (classKey, text) => {
                updateActivity();
                setData(prev => ({ ...prev, chunks: { ...(prev.chunks || {}), [classKey]: text } }));
            };

            // Import/Export Lógica
            const exportData = () => {
                const dataStr = localStorage.getItem('lingoTubeData');
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `LingoTube_Respaldo_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData && typeof importedData === 'object' && importedData.completed) {
                            localStorage.setItem('lingoTubeData', JSON.stringify(importedData));
                            window.location.reload(); 
                        } else {
                            alert("El archivo no parece ser un respaldo válido de LingoTube.");
                        }
                    } catch (err) {
                        alert("Error al leer el archivo JSON.");
                    }
                };
                reader.readAsText(file);
            };

            return { data, toggleProgress, toggleBookmark, toggleRoutinePhase, saveNote, saveChunk, courseData, updateCourseData, streakIncreased, exportData, importData };
        }

        const getOffset = (index) => {
            const cycle = index % 8;
            if (cycle === 0 || cycle === 4) return 0;
            if (cycle === 1 || cycle === 3) return 30;
            if (cycle === 2) return 50;
            if (cycle === 5 || cycle === 7) return -30;
            if (cycle === 6) return -50;
            return 0;
        };

        const App = () => {
            const { data, toggleProgress, toggleBookmark, toggleRoutinePhase, saveNote, saveChunk, courseData, updateCourseData, streakIncreased, exportData, importData } = useAppStore();
            const [currentTab, setCurrentTab] = React.useState('learn');
            const [currentLevel, setCurrentLevel] = React.useState('beginner');
            const [selectedClass, setSelectedClass] = React.useState(null);
            const [isRoutineOpen, setIsRoutineOpen] = React.useState(false);
            const [isCourseInfoOpen, setIsCourseInfoOpen] = React.useState(false); 
            const [isStreakModalOpen, setIsStreakModalOpen] = React.useState(false);
            const [dailyQuote, setDailyQuote] = React.useState('');
            const [streakQuote, setStreakQuote] = React.useState('');
            const [showScrollTop, setShowScrollTop] = React.useState(false);
            
            const activeNodeRef = React.useRef(null);

            React.useEffect(() => {
                setDailyQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
                setStreakQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
            }, []);

            React.useEffect(() => { if (streakIncreased) setIsStreakModalOpen(true); }, [streakIncreased]);

            React.useEffect(() => {
                if (currentTab === 'learn' && activeNodeRef.current) {
                    setTimeout(() => { activeNodeRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
                }
            }, [currentTab, currentLevel]);

            React.useEffect(() => {
                const handleScroll = () => { setShowScrollTop(window.scrollY > 300); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            const currentDay = new Date().getDay();
            const currentPlan = STUDY_PLAN[currentDay];
            const planDetails = getPlanDetails(currentPlan.type, currentLevel);

            const renderHeader = () => {
                const totalClassesDone = data.completed.beginner.length + data.completed.intermediate.length + data.completed.advanced.length;
                return (
                    <header className="fixed top-0 w-full bg-darker/90 backdrop-blur-md z-40 border-b border-surface px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-wider text-white">
                            <Icon name="PlayCircle" color="#58cc02" />
                            LingoTube
                        </div>
                        <div className="flex gap-4 font-bold text-lg">
                            <button onClick={() => setIsStreakModalOpen(true)} className="flex items-center gap-1 text-orange-400 hover:text-orange-300 transition-all relative">
                                <div className={`transition-all duration-300 flex items-center gap-1 ${streakIncreased ? 'scale-125 text-orange-500 drop-shadow-[0_0_8px_rgba(255,165,0,0.8)]' : ''}`}>
                                    <Icon name="Flame" color="currentColor" className={data.streak > 0 ? 'animate-pulse-glow' : ''} />
                                    <span>{data.streak}</span>
                                </div>
                                {streakIncreased && <span className="absolute -top-4 left-6 text-orange-500 font-black text-lg animate-float-up pointer-events-none">+1</span>}
                            </button>
                            <div className="flex items-center gap-1 text-duoblue">
                                <Icon name="CheckCircle" color="currentColor" />
                                <span>{totalClassesDone}</span>
                            </div>
                        </div>
                    </header>
                );
            };

            const renderStreakModal = () => {
                if (!isStreakModalOpen) return null;
                const daysOfWeek = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
                const todayIdx = currentDay === 0 ? 6 : currentDay - 1;
                const { streak, streakFreezes } = data;

                return (
                    <div className="fixed inset-0 bg-dark/95 z-50 flex flex-col items-center justify-center p-6 animate-[scaleIn_0.2s_ease-out]">
                        <button onClick={() => setIsStreakModalOpen(false)} className="absolute top-6 right-6 text-duotext hover:text-white bg-surface p-2 rounded-full"><Icon name="X" /></button>
                        
                        <div className="relative">
                            <div className="absolute inset-0 bg-orange-500/20 blur-3xl rounded-full scale-150"></div>
                            <Icon name="Flame" color="#ff9600" size={120} className="drop-shadow-[0_0_15px_rgba(255,150,0,0.8)] animate-pulse-glow relative z-10" />
                        </div>
                        
                        <h2 className="text-4xl font-black text-white mt-6 mb-2">{streak} {streak === 1 ? 'Día' : 'Días'}</h2>
                        <p className="text-lg font-bold text-orange-400 mb-8 tracking-wide uppercase">¡Racha actual!</p>

                        <div className="bg-surface border-2 border-duogray rounded-3xl p-6 w-full max-w-sm mb-6 shadow-2xl">
                            <div className="flex justify-between items-center w-full">
                                {daysOfWeek.map((dayLabel, idx) => {

                            </div>

                    <div className={`bg-surface rounded-b-2xl border-2 border-t-0 border-surface shadow-lg px-4 ${isCourseInfoOpen ? 'py-5' : 'py-0 h-0 border-transparent overflow-hidden'} transition-all duration-300 ease-in-out`}>

            const renderRoutinePanel = () => {

                const completedPhases = data.routineProgress?.[todayStr] || [];
                const totalPhases = planDetails.phases.length;

                return (
                    <div className="mb-8">
                        <div className={`rounded-2xl p-4 shadow-lg border-b-4 cursor-pointer transition-all ${currentPlan.color} ${isRoutineOpen ? 'border-b-0 mb-1 rounded-b-none' : 'border-black/30'}`} onClick={() => setIsRoutineOpen(!isRoutineOpen)}>

                                    </div>
                                </div>
                            ))}
                        </div>

            const renderProfileTab = () => (

                    <div className="bg-surface rounded-2xl p-5 mb-6 border-2 border-duogray shadow-lg">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="bg-duogreen/20 p-2 rounded-xl text-duogreen"><Icon name="Save" size={24} /></div>
                            <h2 className="font-bold text-lg text-white">Copia de Seguridad</h2>
                        </div>
                        <p className="text-sm text-duotext mb-4">Guarda tu progreso (rachas, notas, clases completadas) en un archivo para usarlo en otro dispositivo.</p>
                        <div className="flex gap-3">
                            <button onClick={exportData} className="flex-1 bg-duogray hover:bg-duogray/80 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-md">
                                <Icon name="Download" size={18} /> Exportar
                            </button>
                            <label className="flex-1 bg-duoblue hover:bg-duoblueDark text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors cursor-pointer shadow-md">
                                <Icon name="Upload" size={18} /> Importar
                                <input type="file" accept=".json" className="hidden" onChange={importData} />
                            </label>
                        </div>
                    </div>

                    {/* CSV UPLOAD SECTION */}
                    <div className="bg-surface rounded-2xl p-5 mb-6 border-2 border-duogray shadow-lg">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-duoblue/20 p-2 rounded-xl text-duoblue"><Icon name="Database" size={24} /></div>
                                <h2 className="font-bold text-lg text-white">Datos de Clases</h2>
                            </div>
                        </div>
                        <p className="text-sm text-duotext mb-6">Añade los archivos CSV para sincronizar los títulos reales y enlaces a YT.</p>
                        
                        {['beginner', 'intermediate', 'advanced'].map(lvl => {
                            const nameMap = { beginner: 'Principiante', intermediate: 'Intermedio', advanced: 'Avanzado' };
                            const classKey = lvl, reviewKey = `${lvl}Review`;
                            const classesLoaded = courseData[classKey] && courseData[classKey].length > 0;
                            const reviewsLoaded = courseData[reviewKey] && courseData[reviewKey].length > 0;
                            return (
                                <div key={lvl} className="mb-6 bg-darker p-4 rounded-xl border border-surface">
                                    <h3 className="font-bold text-md mb-3 text-white border-b border-surface pb-2">{nameMap[lvl]}</h3>
                                    <div className="mb-4">
                                        <label className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-sm text-duotext">Clases Originales</span>
                                            {classesLoaded ? <span className="text-xs font-bold text-duogreen flex items-center gap-1"><Icon name="Check" size={14}/> {courseData[classKey].length} cargadas</span> : <span className="text-xs font-bold text-orange-400">Falta subir</span>}
                                        </label>
                                        <input type="file" accept=".csv" onChange={(e) => { if(e.target.files[0]) handleFileUpload(classKey, e.target.files[0]); }} className="block w-full text-xs text-duotext file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-duoblue/20 file:text-duoblue cursor-pointer" />
                                    </div>
                                    <div>
                                        <label className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-sm text-duotext">Repasos de 18m</span>
                                            {reviewsLoaded ? <span className="text-xs font-bold text-duogold flex items-center gap-1"><Icon name="Check" size={14}/> {courseData[reviewKey].length} cargados</span> : <span className="text-xs font-bold text-orange-400">Falta subir</span>}
                                        </label>
                                        <input type="file" accept=".csv" onChange={(e) => { if(e.target.files[0]) handleFileUpload(reviewKey, e.target.files[0]); }} className="block w-full text-xs text-duotext file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-duogold/20 file:text-duogold cursor-pointer" />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderTabBar = () => (
                <nav className="fixed bottom-0 w-full bg-darker border-t border-surface py-3 px-2 sm:px-6 z-40 pb-safe">
                    <div className="flex justify-around max-w-md mx-auto relative">
                        <button onClick={() => setCurrentTab('learn')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'learn' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}><Icon name="Home" /><span className="text-[10px] sm:text-xs font-bold mt-1">Aprender</span></button>
                        <button onClick={() => setCurrentTab('bookmarks')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'bookmarks' ? 'text-orange-500 bg-orange-500/10' : 'text-duotext'}`}><Icon name="Bookmark" /><span className="text-[10px] sm:text-xs font-bold mt-1">Repasar</span></button>
                        <button onClick={() => setCurrentTab('stats')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'stats' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}><Icon name="BarChart2" /><span className="text-[10px] sm:text-xs font-bold mt-1">Estadísticas</span></button>
                        <button onClick={() => setCurrentTab('profile')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'profile' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}><Icon name="User" /><span className="text-[10px] sm:text-xs font-bold mt-1">Perfil</span></button>
                    </div>
                </nav>
            );

            const renderModal = () => {
                if (!selectedClass) return null;

                const classKey = `${currentLevel}-${selectedClass}`;
                const isClassCompleted = data.completed[currentLevel].includes(selectedClass);
                const isReviewCompleted = data.reviews[currentLevel].includes(selectedClass);
                const isBookmarked = data.bookmarks[currentLevel].includes(selectedClass);
                
                const note = data.notes[classKey] || '';
                const chunk = data.chunks[classKey] || '';

                const courseInfo = courseData[currentLevel]?.find(c => c.id === selectedClass);
                const ytClassLink = courseInfo && courseInfo.videoUrl ? courseInfo.videoUrl : `https://www.youtube.com/watch?list=${PLAYLISTS[currentLevel]}&index=${selectedClass}`;
                const displayTitle = courseInfo && courseInfo.title ? courseInfo.title : `Clase ${selectedClass}`;
                const ytReviewLink = courseData[`${currentLevel}Review`]?.find(c => c.id === selectedClass)?.videoUrl || null; 

                // Estado local para expandir descripción larga del CSV si existe
                const [descExpanded, setDescExpanded] = React.useState(false);

                return (
                    <div className="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center p-4">
                        <div className="bg-dark w-full max-w-sm rounded-3xl p-6 flex flex-col gap-4 transform transition-all border-2 border-surface animate-[slideUp_0.3s_ease-out] max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-start border-b border-surface pb-4 mb-2">
                                <div className="pr-4">
                                    <div className="text-duotext text-sm font-bold uppercase tracking-wider mb-1">{currentLevel === 'beginner' ? 'Principiante' : currentLevel === 'intermediate' ? 'Intermedio' : 'Avanzado'} • #{selectedClass}</div>
                                    <h3 className="text-xl font-bold leading-tight">{displayTitle}</h3>
                                </div>
                                <div className="flex gap-2 shrink-0">
                                    <button onClick={() => toggleBookmark(currentLevel, selectedClass)} className={`p-2 rounded-full transition-colors ${isBookmarked ? 'bg-orange-500 text-white shadow-[0_0_10px_rgba(255,165,0,0.5)]' : 'bg-surface text-duotext hover:text-white'}`} title="Marcar para repasar"><Icon name="Bookmark" /></button>
                                    <button onClick={() => setSelectedClass(null)} className="bg-surface p-2 rounded-full text-duotext hover:text-white"><Icon name="X" /></button>
                                </div>
                            </div>

                            {courseInfo && courseInfo.description && (
                                <div className="bg-darker p-3 rounded-xl border border-duogray mb-1 cursor-pointer" onClick={() => setDescExpanded(!descExpanded)}>
                                    <div className="flex justify-between items-center mb-1">
                                        <h4 className="text-xs font-bold text-duotext uppercase tracking-wider">Notas de la Clase</h4>
                                        <Icon name={descExpanded ? "ChevronUp" : "ChevronDown"} size={16} className="text-duotext" />
                                    </div>
                                    <p className={`text-sm text-white/90 whitespace-pre-wrap leading-relaxed ${descExpanded ? '' : 'line-clamp-3'}`}>
                                        {renderHighlightedText(courseInfo.description)}
                                    </p>
                                </div>
                            )}

                            <div className="flex gap-2 mb-2 mt-1">
                                <a href={ytClassLink} target="_blank" className="duo-btn flex-1 bg-[#ff0000] hover:bg-[#cc0000] text-white font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 border-[#b30000] text-sm"><Icon name="Youtube" size={20} /><span>Clase (60m)</span></a>
                                {ytReviewLink && <a href={ytReviewLink} target="_blank" className="duo-btn flex-1 bg-duogold hover:bg-duogoldDark text-white font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 border-[#cca000] text-sm"><Icon name="PlayCircle" size={20} /><span>Repaso (18m)</span></a>}
                            </div>

                            <div className="grid grid-cols-1 gap-3 mb-2">
                                <button onClick={() => { const d = !data.completed[currentLevel].includes(selectedClass); if(d) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#58cc02', '#ffffff'] }); toggleProgress(currentLevel, selectedClass, 'completed'); }} className={`duo-btn w-full font-bold py-3 px-2 rounded-2xl flex items-center justify-center gap-2 text-[15px] border-b-4 ${isClassCompleted ? 'bg-surface text-white border-duogray' : 'bg-duogreen text-white border-duogreenDark'}`}>
                                    {isClassCompleted ? <Icon name="Undo2" size={20}/> : <Icon name="Check" size={20}/>} {isClassCompleted ? 'Desmarcar Clase' : 'Completar Clase (y previas)'}
                                </button>
                                <button onClick={() => { const d = !data.reviews[currentLevel].includes(selectedClass); if(d) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ffc800', '#ffffff'] }); toggleProgress(currentLevel, selectedClass, 'reviews'); }} className={`duo-btn w-full font-bold py-3 px-2 rounded-2xl flex items-center justify-center gap-2 text-[15px] border-b-4 ${isReviewCompleted ? 'bg-surface text-white border-duogray' : 'bg-duogold text-white border-duogoldDark'}`}>
                                    {isReviewCompleted ? <Icon name="Undo2" size={20}/> : <Icon name="RotateCw" size={20}/>} {isReviewCompleted ? 'Desmarcar Repaso' : 'Completar Repaso (y previos)'}
                                </button>
                            </div>

                            <div className="mt-2 bg-darker p-3 rounded-2xl border border-purple-500/30">
                                <label className="flex items-center justify-between text-sm font-bold text-purple-400 mb-2">
                                    <div className="flex items-center gap-2"><Icon name="Zap" size={16} /> Estructuras / Chunks</div>
                                    <span className="text-[10px] bg-purple-500/20 px-2 py-0.5 rounded text-purple-300">Usa ==texto== para subrayar</span>
                                </label>
                                <textarea className="w-full bg-dark border-2 border-duogray rounded-xl p-3 text-white focus:outline-none focus:border-purple-500 resize-none h-16 font-mono text-[13px]" placeholder="Ej. ==cost an arm and a leg==" value={chunk} onChange={(e) => saveChunk(classKey, e.target.value)}></textarea>
                            </div>

                            <div className="mt-2">
                                <label className="flex items-center justify-between text-sm font-bold text-duotext mb-2">
                                    <div className="flex items-center gap-2"><Icon name="BookOpen" size={16} /> Mis Notas</div>
                                    <span className="text-[10px] bg-white/10 px-2 py-0.5 rounded text-white/50">Usa ==texto== para subrayar</span>
                                </label>
                                <textarea className="w-full bg-surface border-2 border-duogray rounded-xl p-3 text-white focus:outline-none focus:border-duoblue resize-none h-20 text-[14px]" placeholder="Escribe tus apuntes libres aquí..." value={note} onChange={(e) => saveNote(classKey, e.target.value)}></textarea>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative font-sans overflow-x-hidden">
                    {renderHeader()}
                    {renderStreakModal()}
                    <main>
                        {currentTab === 'learn' && renderLearnTab()}
                        {currentTab === 'bookmarks' && renderBookmarksTab()}
                        {currentTab === 'stats' && renderStatsTab()}
                        {currentTab === 'profile' && renderProfileTab()}
                    </main>
                    
                    {showScrollTop && currentTab === 'learn' && (
                        <button onClick={scrollToTop} className="fixed bottom-20 right-4 w-12 h-12 bg-duoblue hover:bg-duoblueDark text-white rounded-full shadow-lg flex items-center justify-center z-30 transition-all animate-[scaleIn_0.2s_ease-out]" aria-label="Subir"><Icon name="ArrowUp" size={24} /></button>
                    )}

                    {renderTabBar()}
                    {renderModal()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
