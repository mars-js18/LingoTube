<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LingoTube - Aprende con YT</title>
    
    <!-- PWA Manifest inyectado como Data URI -->

    <meta name="theme-color" content="#111b21">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Librerías -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Librería para el Confeti estilo Duolingo -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#111b21',
                        darker: '#0b141a',
                        surface: '#202f36',
                        duogreen: '#58cc02',
                        duogreenDark: '#46a302',
                        duoblue: '#1cb0f6',
                        duoblueDark: '#1899d6',
                        duogold: '#ffc800',
                        duogoldDark: '#e5b400',
                        duosilver: '#e5e7eb',
                        duosilverDark: '#9ca3af',
                        duogray: '#37464f',
                        duotext: '#afbac0',
                        planMonday: '#8b5cf6',
                        planFriday: '#ec4899',
                        planSaturday: '#06b6d4',
                        planSunday: '#10b981'
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'ping-once': 'ping 0.5s cubic-bezier(0, 0, 0.2, 1) 1',
                        'pulse-glow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #111b21; color: white; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111b21; }
        ::-webkit-scrollbar-thumb { background: #37464f; border-radius: 10px; }
        
        .duo-btn {
            transition: all 0.1s;
            border-bottom-width: 4px;
        }
        .duo-btn:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-bottom: 4px;
        }
        
        .path-node { position: relative; z-index: 10; }
        .node-connector { position: absolute; width: 4px; z-index: 1; }

        .routine-panel {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .routine-panel.open {
            max-height: 1000px;
            opacity: 1;
        }
        
        /* Modales */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', (e) => {});
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW error:', err));
        }
    </script>

    <script type="text/babel">
        // --- ICONOS ---
        const Icon = ({ name, size = 24, className = "", color="currentColor" }) => {
            const ref = React.useRef();
            React.useEffect(() => {
                if (ref.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size, stroke: color }
                    });
                }
            }, [name, size, className, color]);
            return <i ref={ref} data-lucide={name}></i>;
        };

        // --- DATOS DEL CURSO ---
        const PLAYLISTS = {
            beginner: 'PLAz9gX__ElWpQ0wYCzec4AenQ91t3n7jT',
            intermediate: 'PLAz9gX__ElWorwvQHOLm-bvFigMyDvuX2',
            advanced: 'PLAz9gX__ElWrCO8O3zRRMOwj2Bk5QtXTx'
        };
        const TOTAL_CLASSES = 195;
        const CLASS_DURATION = 60; // Minutos aprox por clase
        const REVIEW_DURATION = 18; // Ajustado a 18 minutos

        const MOTIVATIONAL_QUOTES = [
            "La práctica distribuida (Spaced Repetition) mejora la retención a largo plazo en un 200% comparado con el estudio masivo. (Ebbinghaus)",
            "El aprendizaje intercalado obliga al cerebro a discriminar patrones, aumentando la fluidez real en un 43%. (Rohrer, 2012)",
            "Dormir después de aprender consolida las memorias y fortalece las conexiones sinápticas del nuevo vocabulario. (Stickgold, 2005)",
            "Cometer errores durante la práctica activa señala al cerebro qué circuitos neuronales debe reforzar. ¡Equivócate sin miedo! (Metcalfe, 2017)",
            "El 'Efecto de Generación' demuestra que recordar activamente una palabra fortalece la memoria mucho más que solo leerla pasivamente. (Slamecka & Graf, 1978)",
            "Tu cerebro consume el 20% de tu energía. Sentir cansancio cognitivo tras una sesión de evocación significa que estás creando nuevas redes neuronales.",
            "La fluidez no es saber muchas palabras, sino automatizar el acceso a las que ya sabes mediante la mielinización de las vías neuronales."
        ];

        // --- DATOS DEL PLAN DE ESTUDIO ---
        const STUDY_PLAN = {
            1: { type: 'advance', name: 'Lunes de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            2: { type: 'advance', name: 'Martes de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            3: { type: 'advance', name: 'Miércoles de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            4: { type: 'advance', name: 'Jueves de Avance', color: 'bg-planMonday', textColor: 'text-planMonday', icon: 'BookOpen' },
            5: { type: 'interference', name: 'Viernes de Interferencia', color: 'bg-planFriday', textColor: 'text-planFriday', icon: 'Shuffle' },
            6: { type: 'consolidation', name: 'Sábado de Consolidación', color: 'bg-planSaturday', textColor: 'text-planSaturday', icon: 'Layers' },
            0: { type: 'rest', name: 'Domingo de Descompresión', color: 'bg-planSunday', textColor: 'text-planSunday', icon: 'Coffee' }
        };

        const PLAN_DETAILS = {
            'advance': {
                title: 'Días de Avance (Lunes a Jueves)',
                description: 'Consumir un video completo (60 mins) secuencialmente para aumentar la fluidez base.',
                phases: [
                    { name: 'Fase 1: Repaso Activo (Mins 0-15)', desc: 'No ver pasivamente. Pausar al ver el estímulo, explicar en voz alta, reanudar para comprobar.' },
                    { name: 'Fase 2: Consumo y Anclaje (Mins 15-60)', desc: 'Enfocarse en prosodia y entonación. No transcribir explicaciones. Usar Método Cornell modificado (preguntas al margen).' },
                    { name: 'Fase 3: Sesión de Evocación Extra (30-45 mins)', desc: 'Forzar fluidez oral. Elegir una: Técnica 4/3/2, Blurting, Tarjetas Inversas, Shadowing o Efecto Protégé.' }
                ]
            },
            'interference': {
                title: 'Día de Interferencia (Viernes)',
                description: 'Romper dependencia lineal y obligar al cerebro a discriminar reglas en tiempo real.',
                phases: [
                    { name: 'Fase 1: Mosaico Visual', desc: 'Ver primeros 15 mins de videos (Lun-Jue) a 1.5x, pausando para responder. Fuerza salto impredecible entre estructuras.' },
                    { name: 'Fase 2: Producción Oral Intercalada', desc: 'Seleccionar preguntas al azar de la semana y grabar respuestas largas, mezclando tiempos verbales.' }
                ]
            },
            'consolidation': {
                title: 'Día de Consolidación (Sábado)',
                description: 'Independizar conocimiento del formato video. CERO videos académicos hoy.',
                phases: [
                    { name: 'Fase 1: Repetición Espaciada (20-30 mins)', desc: 'Repasar estructuras algorítmicamente (Anki/RemNote) antes de la curva del olvido.' },
                    { name: 'Fase 2: Interacción No Guionizada', desc: 'Diálogo en tiempo real: tutor, IA conversacional o monólogo ininterrumpido. Transferencia pura.' }
                ]
            },
            'rest': {
                title: 'Día de Descompresión (Domingo)',
                description: 'Recuperación neuroquímica. Cero estudio consciente.',
                phases: [
                    { name: 'Exposición Pasiva', desc: 'Exponerse al idioma solo por entretenimiento y placer (documental, lectura, podcast). Asienta el lexicón y reduce filtro afectivo.' }
                ]
            }
        };

        // --- ESTADO GLOBAL (Custom Hook) ---
        function useAppStore() {
            const [data, setData] = React.useState(() => {
                const saved = localStorage.getItem('lingoTubeData');
                let parsed = saved ? JSON.parse(saved) : null;
                if (!parsed) {
                    parsed = {
                        streak: 0,
                        lastActiveDate: null,
                        completed: { beginner: [], intermediate: [], advanced: [] },
                        reviews: { beginner: [], intermediate: [], advanced: [] },
                        notes: {}
                    };
                }
                return parsed;
            });

            React.useEffect(() => {
                localStorage.setItem('lingoTubeData', JSON.stringify(data));
            }, [data]);

            // ESTADO PARA LOS 6 CSVs (Clases y Repasos)
            const [courseData, setCourseData] = React.useState(() => {
                const saved = localStorage.getItem('lingoTubeCourseData');
                const defaultData = { 
                    beginner: [], intermediate: [], advanced: [],
                    beginnerReview: [], intermediateReview: [], advancedReview: []
                };
                return saved ? { ...defaultData, ...JSON.parse(saved) } : defaultData;
            });

            React.useEffect(() => {
                localStorage.setItem('lingoTubeCourseData', JSON.stringify(courseData));
            }, [courseData]);

            const updateCourseData = (levelKey, levelData) => {
                setCourseData(prev => ({ ...prev, [levelKey]: levelData }));
            };

            const [streakIncreased, setStreakIncreased] = React.useState(false);

            React.useEffect(() => {
                const today = new Date().toDateString();
                if (data.lastActiveDate !== today) {
                    let newStreak = data.streak;
                    if (data.lastActiveDate) {
                        const yesterday = new Date();
                        yesterday.setDate(yesterday.getDate() - 1);
                        if (data.lastActiveDate !== yesterday.toDateString()) {
                            newStreak = 0; // Se perdió la racha
                            setData(prev => ({...prev, streak: newStreak}));
                        }
                    }
                }
            }, []);

            const updateActivity = () => {
                const today = new Date().toDateString();
                setData(prev => {
                    if (prev.lastActiveDate === today) return prev;
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const keptStreak = prev.lastActiveDate === yesterday.toDateString();
                    
                    if (keptStreak || prev.streak === 0) {
                        setStreakIncreased(true);
                        setTimeout(() => setStreakIncreased(false), 1500);
                        confetti({ particleCount: 50, spread: 60, origin: { y: 0.1 }, colors: ['#ffc800', '#ff4b4b'] });
                    }

                    return {
                        ...prev,
                        streak: keptStreak ? prev.streak + 1 : 1,
                        lastActiveDate: today
                    };
                });
            };

            const toggleProgress = (level, classId, type) => {
                updateActivity();
                
                setData(prev => {
                    const isDone = prev[type][level].includes(classId);
                    const newState = { ...prev };
                    
                    if (isDone) {
                        newState[type] = {
                            ...prev[type],
                            [level]: prev[type][level].filter(id => id < classId)
                        };
                        if (type === 'completed') {
                            newState.reviews = {
                                ...prev.reviews,
                                [level]: prev.reviews[level].filter(id => id < classId)
                            };
                        }
                    } else {
                        const newIds = Array.from({ length: classId }, (_, i) => i + 1);
                        newState[type] = {
                            ...prev[type],
                            [level]: Array.from(new Set([...prev[type][level], ...newIds]))
                        };
                        if (type === 'reviews') {
                            newState.completed = {
                                ...prev.completed,
                                [level]: Array.from(new Set([...prev.completed[level], ...newIds]))
                            };
                        }
                    }
                    return newState;
                });
            };

            const saveNote = (classKey, text) => {
                updateActivity();
                setData(prev => ({
                    ...prev,
                    notes: { ...prev.notes, [classKey]: text }
                }));
            };

            return { data, toggleProgress, saveNote, updateActivity, courseData, updateCourseData, streakIncreased };
        }

        // --- COMPONENTES ---

        const getOffset = (index) => {
            const cycle = index % 8;
            if (cycle === 0 || cycle === 4) return 0;
            if (cycle === 1 || cycle === 3) return 30;
            if (cycle === 2) return 50;
            if (cycle === 5 || cycle === 7) return -30;
            if (cycle === 6) return -50;
            return 0;
        };

        const App = () => {
            const { data, toggleProgress, saveNote, courseData, updateCourseData, streakIncreased } = useAppStore();
            const [currentTab, setCurrentTab] = React.useState('learn');
            const [currentLevel, setCurrentLevel] = React.useState('beginner');
            const [selectedClass, setSelectedClass] = React.useState(null);
            const [isRoutineOpen, setIsRoutineOpen] = React.useState(false);
            const [isStreakModalOpen, setIsStreakModalOpen] = React.useState(false);
            const [dailyQuote, setDailyQuote] = React.useState('');
            const [streakQuote, setStreakQuote] = React.useState('');

            React.useEffect(() => {
                setDailyQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
                setStreakQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
            }, []);

            const currentDay = new Date().getDay();
            const currentPlan = STUDY_PLAN[currentDay];
            const planDetails = PLAN_DETAILS[currentPlan.type];

            const renderHeader = () => {
                const totalClassesDone = data.completed.beginner.length + data.completed.intermediate.length + data.completed.advanced.length;
                
                return (
                    <header className="fixed top-0 w-full bg-darker/90 backdrop-blur-md z-40 border-b border-surface px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-wider text-white">
                            <Icon name="PlayCircle" color="#58cc02" />
                            LingoTube
                        </div>
                        <div className="flex gap-4 font-bold text-lg">
                            <button 
                                onClick={() => setIsStreakModalOpen(true)}
                                className={`flex items-center gap-1 text-orange-400 hover:text-orange-300 transition-all ${streakIncreased ? 'scale-125 animate-ping-once' : ''}`}
                            >
                                <Icon name="Flame" color="currentColor" className={data.streak > 0 ? 'animate-pulse-glow' : ''} />
                                <span>{data.streak}</span>
                            </button>
                            <div className="flex items-center gap-1 text-duoblue">
                                <Icon name="CheckCircle" color="currentColor" />
                                <span>{totalClassesDone}</span>
                            </div>
                        </div>
                    </header>
                );
            };

            const renderStreakModal = () => {
                if (!isStreakModalOpen) return null;

                const daysOfWeek = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
                const todayIdx = currentDay === 0 ? 6 : currentDay - 1; // 0=Lun, 6=Dom
                const { streak } = data;

                return (
                    <div className="fixed inset-0 bg-dark/95 z-50 flex flex-col items-center justify-center p-6 animate-[scaleIn_0.2s_ease-out]">
                        <button 
                            onClick={() => setIsStreakModalOpen(false)} 
                            className="absolute top-6 right-6 text-duotext hover:text-white bg-surface p-2 rounded-full"
                        >
                            <Icon name="X" />
                        </button>
                        
                        <div className="relative">
                            <div className="absolute inset-0 bg-orange-500/20 blur-3xl rounded-full scale-150"></div>
                            <Icon name="Flame" color="#ff9600" size={120} className="drop-shadow-[0_0_15px_rgba(255,150,0,0.8)] animate-pulse-glow relative z-10" />
                        </div>
                        
                        <h2 className="text-4xl font-black text-white mt-6 mb-2">{streak} {streak === 1 ? 'Día' : 'Días'}</h2>
                        <p className="text-lg font-bold text-orange-400 mb-10 tracking-wide uppercase">¡Racha actual!</p>

                        {/* Semana Visual */}
                        <div className="bg-surface border-2 border-duogray rounded-3xl p-6 w-full max-w-sm mb-8 shadow-2xl">
                            <div className="flex justify-between items-center w-full">
                                {daysOfWeek.map((dayLabel, idx) => {
                                    // Logica para iluminar dias de la semana segun la racha
                                    const isLit = streak >= 7 || 
                                                  (idx <= todayIdx && idx > todayIdx - streak) || 
                                                  (todayIdx - streak < 0 && idx >= 7 + (todayIdx - streak));
                                    const isToday = idx === todayIdx;

                                    return (
                                        <div key={idx} className="flex flex-col items-center gap-2">
                                            <span className={`text-xs font-bold ${isToday ? 'text-white' : 'text-duotext'}`}>{dayLabel}</span>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${
                                                isLit 
                                                ? 'bg-orange-500 text-white shadow-[0_0_10px_rgba(255,150,0,0.6)]' 
                                                : 'bg-darker border-2 border-duogray text-transparent'
                                            }`}>
                                                {isLit && <Icon name="Check" size={16} />}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Frase en el modal de Racha */}
                        <div className="max-w-sm text-center px-4 mb-10">
                            <p className="text-duotext italic text-sm leading-relaxed">"{streakQuote}"</p>
                        </div>

                        <button 
                            onClick={() => setIsStreakModalOpen(false)}
                            className="duo-btn w-full max-w-sm bg-duoblue hover:bg-duoblueDark text-white font-bold py-4 rounded-2xl border-[#1899d6] text-lg uppercase tracking-wider shadow-lg"
                        >
                            Continuar
                        </button>
                    </div>
                );
            };

            const renderRoutinePanel = () => {
                return (
                    <div className="mb-8 mt-2">
                        <div 
                            className={`rounded-2xl p-4 shadow-lg border-b-4 cursor-pointer transition-all ${currentPlan.color} ${isRoutineOpen ? 'border-b-0 mb-1 rounded-b-none' : 'border-black/30'}`}
                            onClick={() => setIsRoutineOpen(!isRoutineOpen)}
                        >
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="bg-black/20 p-2 rounded-xl text-white">
                                        <Icon name={currentPlan.icon} size={24} />
                                    </div>
                                    <div>
                                        <h2 className="font-bold text-lg text-white">{currentPlan.name}</h2>
                                        <p className="text-sm text-white/80 font-medium">Toca para ver la rutina de hoy</p>
                                    </div>
                                </div>
                                <div className="text-white bg-black/20 p-1 rounded-full">
                                    <Icon name={isRoutineOpen ? "ChevronUp" : "ChevronDown"} size={20} />
                                </div>
                            </div>
                        </div>

                        <div className={`bg-surface rounded-b-2xl border-2 border-t-0 border-surface shadow-lg px-4 ${isRoutineOpen ? 'py-4' : 'py-0 h-0 border-transparent overflow-hidden'} transition-all duration-300 ease-in-out`}>
                            {isRoutineOpen && (
                                <div className="animate-[slideUp_0.3s_ease-out]">
                                    <h3 className={`font-bold text-lg mb-2 ${currentPlan.textColor}`}>{planDetails.title}</h3>
                                    <p className="text-sm text-duotext mb-4">{planDetails.description}</p>
                                    
                                    <div className="flex flex-col gap-3">
                                        {planDetails.phases.map((phase, idx) => (
                                            <div key={idx} className="bg-darker p-3 rounded-xl border border-duogray/50">
                                                <h4 className="font-bold text-sm text-white mb-1">{phase.name}</h4>
                                                <p className="text-xs text-duotext leading-relaxed">{phase.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderLearnTab = () => {
                const classes = Array.from({ length: TOTAL_CLASSES }, (_, i) => i + 1);
                const completedInLevel = data.completed[currentLevel] || [];
                const reviewsInLevel = data.reviews[currentLevel] || [];
                
                let nextUp = classes.find(c => !completedInLevel.includes(c));
                if (!nextUp) {
                    nextUp = classes.find(c => !reviewsInLevel.includes(c)) || TOTAL_CLASSES + 1; // +1 para el Trofeo
                }

                return (
                    <div className="pb-24 pt-20 px-4 max-w-md mx-auto">
                        
                        {renderRoutinePanel()}

                        <div className="flex bg-surface rounded-2xl p-1 mb-8 shadow-lg">
                            {['beginner', 'intermediate', 'advanced'].map(lvl => (
                                <button 
                                    key={lvl}
                                    onClick={() => setCurrentLevel(lvl)}
                                    className={`flex-1 py-2 text-sm font-bold rounded-xl transition-colors ${currentLevel === lvl ? 'bg-duogray text-white' : 'text-duotext hover:bg-duogray/50'}`}
                                >
                                    {lvl === 'beginner' ? 'Principiante' : lvl === 'intermediate' ? 'Intermedio' : 'Avanzado'}
                                </button>
                            ))}
                        </div>

                        <div className="mb-8 flex items-center justify-between bg-surface p-4 rounded-2xl">
                            <div>
                                <h2 className="font-bold text-lg">Progreso de Nivel</h2>
                                <p className="text-sm text-duotext">
                                    <span className="text-duogreen">{completedInLevel.length} Clases</span> / <span className="text-duogold">{reviewsInLevel.length} Repasos</span>
                                </p>
                            </div>
                            <div className="text-right">
                                <div className="text-xl font-bold text-duogreen">{Math.round((completedInLevel.length / TOTAL_CLASSES) * 100)}%</div>
                            </div>
                        </div>

                        <div className="flex flex-col items-center relative">
                            {classes.map((cls, index) => {
                                const isClassCompleted = completedInLevel.includes(cls);
                                const isReviewCompleted = reviewsInLevel.includes(cls);
                                const isCurrent = cls === nextUp;
                                const hasNote = !!data.notes[`${currentLevel}-${cls}`];
                                
                                const offset = getOffset(index);
                                
                                let bgColor = 'bg-surface';
                                let borderColor = 'border-duogray';
                                let iconColor = '#afbac0';
                                let extraClasses = '';
                                let iconName = hasNote ? "BookOpen" : "Play";

                                if (isReviewCompleted) {
                                    bgColor = 'bg-duogold'; borderColor = 'border-duogoldDark'; iconColor = '#ffffff'; iconName = "Check";
                                } else if (isClassCompleted) {
                                    if (isCurrent) {
                                        bgColor = 'bg-duogold'; borderColor = 'border-duogoldDark'; iconColor = '#ffffff';
                                        extraClasses = 'animate-bounce-slow shadow-[0_0_20px_rgba(255,200,0,0.5)]';
                                        iconName = "RotateCw";
                                    } else {
                                        bgColor = 'bg-duogreen'; borderColor = 'border-duogreenDark'; iconColor = '#ffffff'; iconName = "Check";
                                    }
                                } else {
                                    if (isCurrent) {
                                        bgColor = 'bg-duogreen'; borderColor = 'border-duogreenDark'; iconColor = '#ffffff';
                                        extraClasses = 'animate-bounce-slow shadow-[0_0_20px_rgba(88,204,2,0.5)]';
                                    } else {
                                        extraClasses = 'opacity-70';
                                    }
                                }

                                const nextClassCompleted = completedInLevel.includes(cls + 1);
                                const nextReviewCompleted = reviewsInLevel.includes(cls + 1);
                                const connectorBg = nextReviewCompleted ? 'bg-duogold' : nextClassCompleted ? 'bg-duogreen' : 'bg-surface';

                                return (
                                    <div key={cls} className="relative flex flex-col items-center mb-6">
                                        {/* Conector normal entre clases */}
                                        <div 
                                            className={`absolute w-3 h-16 -bottom-10 -z-10 transition-colors duration-500 ${connectorBg}`}
                                            style={{
                                                transform: `translateX(${(getOffset(index + 1) - offset) / 2}px) rotate(${Math.atan2(100, getOffset(index + 1) - offset) * (180/Math.PI) - 90}deg)`,
                                                transformOrigin: 'top center',
                                                borderRadius: '4px'
                                            }}
                                        />

                                        <button 
                                            onClick={() => setSelectedClass(cls)}
                                            className={`path-node w-16 h-16 rounded-full border-b-4 flex items-center justify-center transition-all ${bgColor} ${borderColor} ${extraClasses}`}
                                            style={{ transform: `translateX(${offset}px)` }}
                                        >
                                            <Icon name={iconName} color={iconColor} size={28} className={iconName === 'Play' ? 'ml-1' : ''} />
                                        </button>
                                        
                                        <div className="absolute top-12 font-bold text-xs bg-darker px-2 py-1 rounded-full border border-surface shadow-sm" style={{ transform: `translateX(${offset}px)` }}>
                                            Clase {cls}
                                        </div>
                                    </div>
                                );
                            })}
                            
                            {/* --- TROFEO FINAL DE CURSO --- */}
                            {(() => {
                                const isSilver = completedInLevel.length === TOTAL_CLASSES;
                                const isGold = reviewsInLevel.length === TOTAL_CLASSES;
                                const trophyOffset = getOffset(TOTAL_CLASSES);
                                
                                let trophyBg = 'bg-surface';
                                let trophyBorder = 'border-duogray';
                                let trophyIconColor = '#afbac0';
                                let trophyAnimate = 'opacity-70';
                                let title = 'Trofeo Bloqueado';

                                if (isGold) {
                                    trophyBg = 'bg-duogold'; trophyBorder = 'border-duogoldDark'; trophyIconColor = '#ffffff';
                                    trophyAnimate = 'shadow-[0_0_40px_rgba(255,200,0,0.8)] animate-bounce-slow';
                                    title = '¡Dominio Dorado!';
                                } else if (isSilver) {
                                    trophyBg = 'bg-duosilver'; trophyBorder = 'border-duosilverDark'; trophyIconColor = '#111b21';
                                    trophyAnimate = 'shadow-[0_0_30px_rgba(229,231,235,0.6)] animate-bounce-slow';
                                    title = '¡Curso de Plata!';
                                }

                                return (
                                    <div className="relative flex flex-col items-center mt-12 mb-10">
                                        <div 
                                            className={`path-node w-24 h-24 rounded-full border-b-[6px] flex items-center justify-center transition-all ${trophyBg} ${trophyBorder} ${trophyAnimate}`}
                                            style={{ transform: `translateX(${trophyOffset}px)` }}
                                            onClick={() => {
                                                if(isGold) confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#ffc800', '#ffffff'] });
                                                else if(isSilver) confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#e5e7eb', '#9ca3af', '#ffffff'] });
                                            }}
                                        >
                                            <Icon name="Crown" color={trophyIconColor} size={48} />
                                        </div>
                                        <div className="absolute top-20 font-bold text-sm bg-darker px-4 py-2 rounded-full border-2 border-surface shadow-xl text-center" style={{ transform: `translateX(${trophyOffset}px)` }}>
                                            {title}
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>

                        {/* Tarjeta de Motivación */}
                        <div className="mt-8 bg-surface border-2 border-duogray p-5 rounded-2xl flex items-start gap-4 shadow-lg">
                            <div className="bg-duoblue/20 p-3 rounded-full shrink-0">
                                <Icon name="Brain" color="#1cb0f6" size={28} />
                            </div>
                            <div>
                                <h4 className="font-bold text-duoblue mb-1">Ciencia del Aprendizaje</h4>
                                <p className="text-sm text-duotext italic leading-relaxed">"{dailyQuote}"</p>
                            </div>
                        </div>

                    </div>
                );
            };

            const renderStatsTab = () => {
                const bDone = data.completed.beginner.length;
                const iDone = data.completed.intermediate.length;
                const aDone = data.completed.advanced.length;
                const totalClassesDone = bDone + iDone + aDone;

                const brDone = data.reviews.beginner.length;
                const irDone = data.reviews.intermediate.length;
                const arDone = data.reviews.advanced.length;
                const totalReviewsDone = brDone + irDone + arDone;

                const totalClasses = TOTAL_CLASSES * 3;
                
                const minsDone = (totalClassesDone * CLASS_DURATION) + (totalReviewsDone * REVIEW_DURATION);
                const hoursDone = (minsDone / 60).toFixed(1);
                
                const minsTotal = (totalClasses * CLASS_DURATION) + (totalClasses * REVIEW_DURATION);
                const minsLeft = minsTotal - minsDone;
                const hoursLeft = (minsLeft / 60).toFixed(1);

                return (
                    <div className="pb-24 pt-20 px-4 max-w-md mx-auto">
                        <h1 className="text-2xl font-bold mb-6">Tu Progreso Global</h1>
                        
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="bg-surface p-4 rounded-2xl border-2 border-duogray">
                                <Icon name="CheckCircle" className="mb-2" color="#58cc02" size={32} />
                                <div className="text-2xl font-bold">{totalClassesDone}</div>
                                <div className="text-sm text-duotext">Clases Listas</div>
                            </div>
                            <div className="bg-surface p-4 rounded-2xl border-2 border-duogray">
                                <Icon name="RotateCw" className="mb-2" color="#ffc800" size={32} />
                                <div className="text-2xl font-bold">{totalReviewsDone}</div>
                                <div className="text-sm text-duotext">Repasos Listos</div>
                            </div>
                            <div className="bg-surface p-4 rounded-2xl border-2 border-duogray">
                                <Icon name="Clock" className="mb-2" color="#1cb0f6" size={32} />
                                <div className="text-2xl font-bold">{hoursDone}h</div>
                                <div className="text-sm text-duotext">Tiempo Invertido</div>
                            </div>
                            <div className="bg-surface p-4 rounded-2xl border-2 border-duogray">
                                <Icon name="Calendar" className="mb-2" color="#ff4b4b" size={32} />
                                <div className="text-2xl font-bold">{hoursLeft}h</div>
                                <div className="text-sm text-duotext">Tiempo Restante</div>
                            </div>
                        </div>

                        <div className="bg-surface rounded-2xl p-5 mb-6">
                            <h2 className="font-bold mb-4">Detalle por Nivel</h2>
                            {[
                                { name: 'Principiante', done: bDone, rev: brDone },
                                { name: 'Intermedio', done: iDone, rev: irDone },
                                { name: 'Avanzado', done: aDone, rev: arDone }
                            ].map(l => (
                                <div key={l.name} className="mb-4 last:mb-0">
                                    <div className="flex justify-between mb-1 text-sm font-bold">
                                        <span>{l.name}</span>
                                        <span className="text-duotext">{l.done}/{TOTAL_CLASSES}</span>
                                    </div>
                                    <div className="h-3 w-full bg-darker rounded-full overflow-hidden relative">
                                        <div className="absolute top-0 left-0 h-full bg-duogreen transition-all duration-500" style={{ width: `${(l.done/TOTAL_CLASSES)*100}%` }}></div>
                                        <div className="absolute top-0 left-0 h-full bg-duogold transition-all duration-500" style={{ width: `${(l.rev/TOTAL_CLASSES)*100}%` }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const parseCSVText = (text) => {
                const lines = text.split('\n');
                const parsedData = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const row = [];
                    let inQuotes = false;
                    let current = '';
                    for (let j = 0; j < lines[i].length; j++) {
                        const char = lines[i][j];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { row.push(current.trim()); current = ''; }
                        else current += char;
                    }
                    row.push(current.trim());
                    if (row.length >= 4) {
                        parsedData.push({ id: parseInt(row[0]), title: row[1].replace(/^"|"$/g, ''), videoUrl: row[2], videoId: row[3] });
                    }
                }
                return parsedData;
            };

            // AUTO-CARGA DESDE GITHUB PAGES (Añadidos los archivos de Review)
            const CSV_LEVELS = [
                'beginner', 'intermediate', 'advanced', 
                'beginnerReview', 'intermediateReview', 'advancedReview'
            ];

            React.useEffect(() => {
                const autoLoad = async () => {
                    for (const lvl of CSV_LEVELS) {
                        if (!courseData[lvl] || courseData[lvl].length === 0) {
                            try {
                                const response = await fetch(`./${lvl}.csv`);
                                if (response.ok) {
                                    const text = await response.text();
                                    updateCourseData(lvl, parseCSVText(text));
                                }
                            } catch (e) {
                                console.log(`No se pudo auto-cargar ${lvl}.csv`);
                            }
                        }
                    }
                };
                autoLoad();
            }, []);

            const syncFromServer = async () => {
                let loadedAny = false;
                for (const lvl of CSV_LEVELS) {
                    try {
                        const response = await fetch(`./${lvl}.csv`);
                        if (response.ok) {
                            const text = await response.text();
                            const parsed = parseCSVText(text);
                            if(parsed.length > 0) {
                                updateCourseData(lvl, parsed);
                                loadedAny = true;
                            }
                        }
                    } catch (err) {}
                }
                if(loadedAny) alert("¡Datos sincronizados con éxito desde GitHub!");
                else alert("No se encontraron algunos archivos .csv.");
            };

            const handleFileUpload = (levelKey, file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    updateCourseData(levelKey, parseCSVText(e.target.result));
                };
                reader.readAsText(file);
            };

            const renderProfileTab = () => (
                <div className="pb-24 pt-20 px-4 max-w-md mx-auto">
                    <h1 className="text-2xl font-bold mb-6">Configuración y Perfil</h1>
                    
                    <div className="bg-surface rounded-2xl p-5 mb-6 border-2 border-duogray shadow-lg">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-3">
                                <Icon name="Database" color="#1cb0f6" size={28} />
                                <h2 className="font-bold text-lg text-white">Datos de Clases</h2>
                            </div>
                            <button onClick={syncFromServer} className="bg-duoblue/20 text-duoblue hover:bg-duoblue/30 p-2 rounded-xl flex items-center gap-1 text-sm font-bold transition-colors">
                                <Icon name="DownloadCloud" size={18} /> Sync
                            </button>
                        </div>
                        <p className="text-sm text-duotext mb-6">
                            Sube tus archivos CSV manualmente o usa el botón Sync si ya están en GitHub Pages.
                        </p>
                        
                        {/* Renderizar Inputs de Archivos Agrupados */}
                        {['beginner', 'intermediate', 'advanced'].map(lvl => {
                            const nameMap = { beginner: 'Principiante', intermediate: 'Intermedio', advanced: 'Avanzado' };
                            const classKey = lvl;
                            const reviewKey = `${lvl}Review`;
                            
                            const classesLoaded = courseData[classKey] && courseData[classKey].length > 0;
                            const reviewsLoaded = courseData[reviewKey] && courseData[reviewKey].length > 0;

                            return (
                                <div key={lvl} className="mb-6 bg-darker p-4 rounded-xl border border-surface">
                                    <h3 className="font-bold text-md mb-3 text-white border-b border-surface pb-2">{nameMap[lvl]}</h3>
                                    
                                    {/* Upload Clases */}
                                    <div className="mb-4">
                                        <label className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-sm text-duotext">Clases Originales</span>
                                            {classesLoaded ? (
                                                <span className="text-xs font-bold text-duogreen flex items-center gap-1"><Icon name="Check" size={14}/> {courseData[classKey].length} cargadas</span>
                                            ) : (
                                                <span className="text-xs font-bold text-orange-400">Falta subir</span>
                                            )}
                                        </label>
                                        <input type="file" accept=".csv" onChange={(e) => { if(e.target.files[0]) handleFileUpload(classKey, e.target.files[0]); }}
                                            className="block w-full text-xs text-duotext file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-duoblue/20 file:text-duoblue hover:file:bg-duoblue/30 cursor-pointer" />
                                    </div>

                                    {/* Upload Repasos */}
                                    <div>
                                        <label className="flex items-center justify-between mb-2">
                                            <span className="font-bold text-sm text-duotext">Repasos de 18m</span>
                                            {reviewsLoaded ? (
                                                <span className="text-xs font-bold text-duogold flex items-center gap-1"><Icon name="Check" size={14}/> {courseData[reviewKey].length} cargados</span>
                                            ) : (
                                                <span className="text-xs font-bold text-orange-400">Falta subir</span>
                                            )}
                                        </label>
                                        <input type="file" accept=".csv" onChange={(e) => { if(e.target.files[0]) handleFileUpload(reviewKey, e.target.files[0]); }}
                                            className="block w-full text-xs text-duotext file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-duogold/20 file:text-duogold hover:file:bg-duogold/30 cursor-pointer" />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderTabBar = () => (
                <nav className="fixed bottom-0 w-full bg-darker border-t border-surface py-3 px-6 z-40 pb-safe">
                    <div className="flex justify-between max-w-md mx-auto">
                        <button onClick={() => setCurrentTab('learn')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'learn' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}>
                            <Icon name="Home" />
                            <span className="text-xs font-bold mt-1">Aprender</span>
                        </button>
                        <button onClick={() => setCurrentTab('stats')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'stats' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}>
                            <Icon name="BarChart2" />
                            <span className="text-xs font-bold mt-1">Estadísticas</span>
                        </button>
                        <button onClick={() => setCurrentTab('profile')} className={`flex flex-col items-center p-2 rounded-xl transition-colors ${currentTab === 'profile' ? 'text-duoblue bg-duoblue/10' : 'text-duotext'}`}>
                            <Icon name="User" />
                            <span className="text-xs font-bold mt-1">Perfil</span>
                        </button>
                    </div>
                </nav>
            );

            // --- ANIMACIÓN AL COMPLETAR ---
            const handleProgressWithConfetti = (level, classId, type) => {
                const isAlreadyDone = data[type][level].includes(classId);
                
                // Solo si lo estamos marcando como nuevo
                if (!isAlreadyDone) {
                    if (type === 'completed') {
                        // Confeti verde
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#58cc02', '#ffffff'] });
                    } else if (type === 'reviews') {
                        // Confeti dorado
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ffc800', '#ffffff'] });
                    }
                }
                
                toggleProgress(level, classId, type);
            };

            const renderModal = () => {
                if (!selectedClass) return null;

                const classKey = `${currentLevel}-${selectedClass}`;
                const isClassCompleted = data.completed[currentLevel].includes(selectedClass);
                const isReviewCompleted = data.reviews[currentLevel].includes(selectedClass);
                const note = data.notes[classKey] || '';

                // Obtener Info de Clase
                const levelCourses = courseData[currentLevel] || [];
                const courseInfo = levelCourses.find(c => c.id === selectedClass);
                const ytClassLink = courseInfo && courseInfo.videoUrl ? courseInfo.videoUrl : `https://www.youtube.com/watch?list=${PLAYLISTS[currentLevel]}&index=${selectedClass}`;
                const displayTitle = courseInfo && courseInfo.title ? courseInfo.title : `Clase ${selectedClass}`;

                // Obtener Info de Repaso (Si el CSV fue cargado)
                const reviewCourses = courseData[`${currentLevel}Review`] || [];
                const reviewInfo = reviewCourses.find(c => c.id === selectedClass);
                const ytReviewLink = reviewInfo && reviewInfo.videoUrl ? reviewInfo.videoUrl : null; // Solo se muestra si hay link real

                return (
                    <div className="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center p-4">
                        <div className="bg-dark w-full max-w-sm rounded-3xl p-6 flex flex-col gap-4 transform transition-all border-2 border-surface animate-[slideUp_0.3s_ease-out] max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-start border-b border-surface pb-4 mb-2">
                                <div className="pr-4">
                                    <div className="text-duotext text-sm font-bold uppercase tracking-wider mb-1">
                                        {currentLevel === 'beginner' ? 'Principiante' : currentLevel === 'intermediate' ? 'Intermedio' : 'Avanzado'} • #{selectedClass}
                                    </div>
                                    <h3 className="text-xl font-bold leading-tight">{displayTitle}</h3>
                                </div>
                                <button onClick={() => setSelectedClass(null)} className="bg-surface p-2 rounded-full text-duotext hover:text-white shrink-0">
                                    <Icon name="X" />
                                </button>
                            </div>

                            <div className="flex gap-2 mb-2">
                                <a 
                                    href={ytClassLink} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="duo-btn flex-1 bg-[#ff0000] hover:bg-[#cc0000] text-white font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 border-[#b30000] text-sm"
                                >
                                    <Icon name="Youtube" size={20} />
                                    <span>Ver Clase (60m)</span>
                                </a>

                                {ytReviewLink && (
                                    <a 
                                        href={ytReviewLink} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="duo-btn flex-1 bg-duogold hover:bg-duogoldDark text-white font-bold py-3 rounded-2xl flex flex-col items-center justify-center gap-1 border-[#cca000] text-sm"
                                    >
                                        <Icon name="PlayCircle" size={20} />
                                        <span>Ver Repaso (18m)</span>
                                    </a>
                                )}
                            </div>

                            <div className="grid grid-cols-1 gap-3">
                                <button 
                                    onClick={() => handleProgressWithConfetti(currentLevel, selectedClass, 'completed')}
                                    className={`duo-btn w-full font-bold py-3 px-2 rounded-2xl flex items-center justify-center gap-2 text-[15px] border-b-4 ${
                                        isClassCompleted 
                                        ? 'bg-surface text-white border-duogray' 
                                        : 'bg-duogreen text-white border-duogreenDark'
                                    }`}
                                >
                                    {isClassCompleted ? <Icon name="Undo2" size={20}/> : <Icon name="Check" size={20}/>}
                                    {isClassCompleted ? 'Desmarcar Clase' : 'Completar Clase (y previas)'}
                                </button>

                                <button 
                                    onClick={() => handleProgressWithConfetti(currentLevel, selectedClass, 'reviews')}
                                    className={`duo-btn w-full font-bold py-3 px-2 rounded-2xl flex items-center justify-center gap-2 text-[15px] border-b-4 ${
                                        isReviewCompleted 
                                        ? 'bg-surface text-white border-duogray' 
                                        : 'bg-duogold text-white border-duogoldDark'
                                    }`}
                                >
                                    {isReviewCompleted ? <Icon name="Undo2" size={20}/> : <Icon name="RotateCw" size={20}/>}
                                    {isReviewCompleted ? 'Desmarcar Repaso' : 'Completar Repaso (y previos)'}
                                </button>
                            </div>

                            <div className="mt-2">
                                <label className="flex items-center gap-2 text-sm font-bold text-duotext mb-2">
                                    <Icon name="BookOpen" size={16} />
                                    Mis Notas para esta clase:
                                </label>
                                <textarea 
                                    className="w-full bg-surface border-2 border-duogray rounded-xl p-3 text-white focus:outline-none focus:border-duoblue resize-none h-24"
                                    placeholder="Escribe aquí el tema, vocabulario o apuntes..."
                                    value={note}
                                    onChange={(e) => saveNote(classKey, e.target.value)}
                                ></textarea>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative font-sans overflow-x-hidden">
                    {renderHeader()}
                    {renderStreakModal()}
                    <main>
                        {currentTab === 'learn' && renderLearnTab()}
                        {currentTab === 'stats' && renderStatsTab()}
                        {currentTab === 'profile' && renderProfileTab()}
                    </main>
                    {renderTabBar()}
                    {renderModal()}
                    
                    <style>{`
                        @keyframes slideUp {
                            from { transform: translateY(-10px); opacity: 0; }
                            to { transform: translateY(0); opacity: 1; }
                        }
                        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
